<script src="firebase-config.js"></script>
<!-- Firebase SDK — config cargada desde archivo externo generado en build -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // La config se inyecta en window.FIREBASE_CONFIG por firebase-config.js (generado en build)
  async function initFirebase() {
    // Esperar hasta que firebase-config.js haya definido window.FIREBASE_CONFIG
    let attempts = 0;
    while (!window.FIREBASE_CONFIG && attempts < 50) {
      await new Promise(r => setTimeout(r, 100));
      attempts++;
    }
    if (!window.FIREBASE_CONFIG) {
      console.error('firebase-config.js no encontrado. Verifica el build de Netlify.');
      return;
    }
    const app = initializeApp(window.FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window._FB = { auth, db, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp };
    window._FB_READY = true;
    document.dispatchEvent(new Event('firebase-ready'));
  }
  initFirebase();
</script>
<style>
/* ============================================================
   VARIABLES & RESET
   ============================================================ */
:root {
  --blue:       #0033A0;
  --blue-dark:  #001E5C;
  --blue-mid:   #0050C8;
  --cyan:       #00A9E0;
  --orange:     #F58220;
  --orange-dk:  #D96C10;
  --green:      #2E7D32;
  --green-lt:   #7AB800;
  --red:        #C62828;
  --yellow:     #F9A825;
  --bg:         #EEF2F9;
  --card:       #FFFFFF;
  --border:     #D0D9EC;
  --txt:        #1A2B4A;
  --txt-muted:  #5A6E8C;
  --shadow:     0 2px 12px rgba(0,30,100,.10);
  --shadow-lg:  0 6px 24px rgba(0,30,100,.15);
  --radius:     12px;
  --radius-sm:  8px;
  --sidebar-w:  240px;
  --header-h:   60px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, Arial, sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  overflow-x: hidden;
}
.hidden { display: none !important; }
a { color: var(--blue); text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ============================================================
   LOGIN
   ============================================================ */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 50%, var(--cyan) 100%);
  padding: 20px;
}
.login-card {
  background: #fff;
  border-radius: 20px;
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 24px 64px rgba(0,0,0,.3);
  text-align: center;
}
.login-logo {
  margin-bottom: 8px;
}
.login-logo img {
  width: 90px;
  height: 90px;
  object-fit: contain;
  border-radius: 12px;
}
.login-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--blue);
  margin-bottom: 4px;
}
.login-sub {
  font-size: 13px;
  color: var(--txt-muted);
  margin-bottom: 28px;
}
.form-group {
  margin-bottom: 14px;
  text-align: left;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--txt-muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 5px;
}
.form-group input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  transition: border-color .2s;
  background: #F8FAFF;
}
.form-group input:focus {
  outline: none;
  border-color: var(--blue);
  background: #fff;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  transition: all .2s;
  white-space: nowrap;
}
.btn-primary { background: var(--blue); color: #fff; }
.btn-primary:hover { background: var(--blue-dark); }
.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover { background: var(--orange-dk); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #1B5E20; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: #8B0000; }
.btn-outline {
  background: transparent;
  color: var(--blue);
  border: 1.5px solid var(--blue);
}
.btn-outline:hover { background: var(--blue); color: #fff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 13px 24px; font-size: 15px; width: 100%; }
.btn-icon {
  width: 34px; height: 34px; padding: 0;
  border-radius: 50%;
  background: rgba(0,51,160,.08);
  color: var(--blue);
  border: none;
}
.btn-icon:hover { background: rgba(0,51,160,.18); }
.login-hint {
  margin-top: 20px;
  padding: 12px;
  background: #F0F4FF;
  border-radius: var(--radius-sm);
  font-size: 11.5px;
  color: var(--txt-muted);
  line-height: 1.6;
  text-align: left;
}
.login-hint strong { color: var(--blue); }

/* ============================================================
   APP SHELL
   ============================================================ */
#app-shell { display: flex; flex-direction: column; min-height: 100vh; }

/* HEADER */
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: var(--blue);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
}
.header-brand img {
  width: 36px;
  height: 36px;
  object-fit: contain;
  border-radius: 6px;
  background: #fff;
  padding: 2px;
}
.header-brand-text {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -.3px;
}
.header-brand-text span { color: var(--orange); }
.header-user {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.header-user-info {
  text-align: right;
  line-height: 1.3;
}
.header-user-info .uname { font-weight: 700; font-size: 13px; }
.header-user-info .urole { font-size: 11px; opacity: .8; }
.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  padding: 6px;
  border-radius: 6px;
}
.menu-toggle:hover { background: rgba(255,255,255,.15); }

/* SIDEBAR */
.app-sidebar {
  position: fixed;
  top: var(--header-h);
  left: 0;
  bottom: 0;
  width: var(--sidebar-w);
  background: var(--blue-dark);
  overflow-y: auto;
  z-index: 90;
  transition: transform .3s ease;
  display: flex;
  flex-direction: column;
}
.sidebar-section {
  padding: 12px 0 4px;
}
.sidebar-section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,.4);
  padding: 0 16px 6px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  color: rgba(255,255,255,.75);
  font-size: 13.5px;
  font-weight: 500;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  cursor: pointer;
  transition: all .2s;
  border-left: 3px solid transparent;
}
.nav-item:hover {
  background: rgba(255,255,255,.08);
  color: #fff;
}
.nav-item.active {
  background: rgba(0,169,224,.15);
  color: #fff;
  border-left-color: var(--orange);
  font-weight: 700;
}
.nav-item svg { flex-shrink: 0; opacity: .85; }
.nav-item.active svg { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 20px;
  min-width: 18px;
  text-align: center;
}
.sidebar-footer {
  margin-top: auto;
  padding: 12px;
  border-top: 1px solid rgba(255,255,255,.1);
}

/* MAIN CONTENT */
.app-main {
  margin-left: var(--sidebar-w);
  margin-top: var(--header-h);
  padding: 24px;
  min-height: calc(100vh - var(--header-h));
}
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 85;
}

/* ============================================================
   COMPONENTS
   ============================================================ */
/* Page header */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--blue-dark);
  line-height: 1.2;
}
.page-sub {
  font-size: 13px;
  color: var(--txt-muted);
  margin-top: 3px;
}

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 8px;
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--blue-dark);
}

/* KPI Grid */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--cyan);
  position: relative;
  overflow: hidden;
}
.kpi-card::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: currentColor;
  opacity: .04;
}
.kpi-card.kpi-good { border-left-color: var(--green); }
.kpi-card.kpi-warn { border-left-color: var(--yellow); }
.kpi-card.kpi-bad  { border-left-color: var(--red); }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--txt-muted); text-transform: uppercase; letter-spacing: .5px; }
.kpi-value { font-size: 30px; font-weight: 800; margin: 6px 0 4px; line-height: 1; }
.kpi-card.kpi-good .kpi-value { color: var(--green); }
.kpi-card.kpi-warn .kpi-value { color: var(--yellow); }
.kpi-card.kpi-bad  .kpi-value { color: var(--red); }
.kpi-target { font-size: 11.5px; color: var(--txt-muted); }
.kpi-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  margin-left: 4px;
}
.badge-ok  { background: var(--green); }
.badge-warn{ background: var(--yellow); color: var(--txt); }
.badge-bad { background: var(--red); }

/* Charts grid */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}
.chart-card h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--blue-dark);
  margin-bottom: 14px;
}

/* Tables */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--blue);
  color: #fff;
  padding: 10px 12px;
  text-align: left;
  font-weight: 600;
  font-size: 12px;
  white-space: nowrap;
}
thead th:first-child { border-radius: 6px 0 0 0; }
thead th:last-child  { border-radius: 0 6px 0 0; }
tbody td { padding: 9px 12px; border-bottom: 1px solid #EEF2F9; vertical-align: middle; }
tbody tr:hover td { background: #F5F8FF; }
tbody tr:last-child td { border-bottom: none; }

/* Badges / Pills */
.pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
}
.pill-pend   { background: #FFF3E0; color: #E65100; }
.pill-prog   { background: #E3F2FD; color: #0277BD; }
.pill-done   { background: #E8F5E9; color: #2E7D32; }
.pill-crit   { background: #FFEBEE; color: #C62828; }
.pill-mayor  { background: #FFF3E0; color: #E65100; }
.pill-moder  { background: #FFF8E1; color: #F57F17; }
.pill-menor  { background: #E8F5E9; color: #2E7D32; }
.pill-degrad { background: #F3E5F5; color: #6A1B9A; }
.pill-prev   { background: #E3F2FD; color: #0277BD; }
.pill-corr   { background: #FFEBEE; color: #C62828; }

/* Forms */
.form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; }
.form-col { flex: 1; min-width: 160px; }
.form-col label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--txt-muted);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 5px;
}
.form-col input,
.form-col select,
.form-col textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  background: #F8FAFF;
  color: var(--txt);
  transition: border-color .2s;
}
.form-col input:focus,
.form-col select:focus,
.form-col textarea:focus {
  outline: none;
  border-color: var(--blue);
  background: #fff;
}
.form-col textarea { resize: vertical; min-height: 70px; }
.form-actions { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }

/* Alerts */
.alert {
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  margin: 10px 0;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.alert-ok   { background: #E8F5E9; color: #1B5E20; border-left: 3px solid var(--green); }
.alert-warn { background: #FFF8E1; color: #E65100; border-left: 3px solid var(--yellow); }
.alert-info { background: #E3F2FD; color: #0D47A1; border-left: 3px solid var(--cyan); }
.alert-err  { background: #FFEBEE; color: #B71C1C; border-left: 3px solid var(--red); }

/* Upload box */
.upload-box {
  border: 2px dashed var(--cyan);
  border-radius: var(--radius);
  padding: 28px;
  text-align: center;
  background: #F0FAFF;
  cursor: pointer;
  transition: background .2s;
}
.upload-box:hover { background: #E0F4FF; }
.upload-box input[type=file] { display: none; }

/* Tabs */
.tab-bar {
  display: flex;
  gap: 4px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
  overflow-x: auto;
}
.tab-btn {
  padding: 10px 16px;
  background: none;
  border: none;
  font-size: 13px;
  font-weight: 600;
  color: var(--txt-muted);
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: all .2s;
}
.tab-btn:hover { color: var(--blue); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--orange); }

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-box {
  background: #fff;
  border-radius: 16px;
  padding: 28px;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,.3);
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 18px; font-weight: 800; color: var(--blue-dark); }
.modal-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: #F0F4FF;
  color: var(--txt);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: #E0E8FF; }

/* Checklist items */
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  margin-bottom: 8px;
  background: #FAFBFF;
}
.check-item input[type=checkbox] {
  width: 16px; height: 16px;
  margin-top: 2px;
  flex-shrink: 0;
  accent-color: var(--blue);
}
.check-item label { font-size: 13px; color: var(--txt); cursor: pointer; flex: 1; }
.check-item .check-param { font-size: 11px; color: var(--txt-muted); margin-top: 2px; }
.check-item.checked { background: #F0FFF4; border-color: #A5D6A7; }
.check-item.checked label { color: var(--green); }

/* ODN Tree */
.odn-tree { font-size: 13px; }
.odn-node {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background .15s;
  border: 1px solid transparent;
}
.odn-node:hover { background: #F0F6FF; border-color: var(--border); }
.odn-node.selected { background: #E3F2FD; border-color: var(--cyan); }
.odn-node-olt { background: #E8EAF6; font-weight: 700; color: var(--blue-dark); }
.odn-node-fat { background: #FFF8E1; }
.odn-node-sub { background: #F1F8E9; }
.odn-children { margin-left: 20px; border-left: 2px solid var(--border); padding-left: 12px; margin-top: 4px; }
.odn-detail-panel {
  background: var(--card);
  border-radius: var(--radius);
  padding: 18px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--cyan);
}
.odn-detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.odn-detail-item label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--txt-muted);
  display: block;
  margin-bottom: 2px;
}
.odn-detail-item span {
  font-size: 13px;
  font-weight: 600;
  color: var(--txt);
}

/* Port grid */
.port-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.port-btn {
  width: 44px; height: 44px;
  border-radius: 8px;
  border: none;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.port-btn:hover { transform: scale(1.1); box-shadow: 0 4px 12px rgba(0,0,0,.2); }
.port-free { background: var(--green-lt); }
.port-used { background: var(--red); }
.port-selected { box-shadow: 0 0 0 3px var(--orange) !important; }

/* Averia cards */
.averia-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  border-left: 4px solid var(--border);
  cursor: pointer;
  transition: box-shadow .2s;
}
.averia-card:hover { box-shadow: var(--shadow-lg); }
.averia-card.sev-1 { border-left-color: var(--red); }
.averia-card.sev-2 { border-left-color: var(--orange); }
.averia-card.sev-3 { border-left-color: var(--yellow); }
.averia-card.sev-4 { border-left-color: var(--green-lt); }
.averia-card.sev-5 { border-left-color: #9C27B0; }
.averia-card.av-selected { outline: 2px solid var(--blue); background: #EEF5FF; }
.averia-card.av-selected:hover { background: #E4EFFF; }
.averia-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.averia-id { font-size: 12px; font-weight: 700; color: var(--txt-muted); }
.averia-title { font-size: 14px; font-weight: 700; color: var(--txt); margin: 3px 0; }
.zona-opt:hover { background: var(--bg) !important; color: var(--txt) !important; }
.averia-meta { font-size: 12px; color: var(--txt-muted); line-height: 1.6; }
.averia-comment { font-size: 12px; color: var(--txt-muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-style: italic; }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  align-items: center;
}
.filter-bar select,
.filter-bar input {
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: #fff;
  color: var(--txt);
}
.filter-bar select:focus,
.filter-bar input:focus {
  outline: none;
  border-color: var(--blue);
}

/* Stats row */
.stats-row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}
.stat-box {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: var(--shadow);
  text-align: center;
  flex: 1;
  min-width: 100px;
}
.stat-box .sv { font-size: 28px; font-weight: 800; color: var(--blue); }
.stat-box .sl { font-size: 11px; color: var(--txt-muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* Responsive */
@media (max-width: 900px) {
  .chart-grid { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 700px) {
  :root { --sidebar-w: 0px; }
  .app-sidebar {
    transform: translateX(-240px);
    width: 240px;
  }
  .app-sidebar.open {
    transform: translateX(0);
  }
  .overlay.show { display: block; }
  .app-main { margin-left: 0; padding: 16px; }
  .menu-toggle { display: flex; align-items: center; justify-content: center; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .header-user-info { display: none; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .form-row { flex-direction: column; }
  .modal-box { padding: 20px 16px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,51,160,.2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,51,160,.4); }

/* Print */
@media print {
  .app-sidebar, .app-header, .btn, .filter-bar { display: none !important; }
  .app-main { margin: 0; padding: 0; }
}
</style>
</head>
<body>

<!-- ========== DIAGNÓSTICO VISUAL (sin consola) ========== -->
<div id="diag-banner" style="display:none;position:fixed;inset:0;z-index:99999;background:#1a1a1a;color:#fff;padding:20px;font-family:monospace;font-size:13px;overflow:auto;white-space:pre-wrap">
  <div style="font-weight:800;font-size:16px;color:#ff6b6b;margin-bottom:12px">⚠️ OPTINET no pudo cargar</div>
  <div id="diag-text" style="line-height:1.5"></div>
  <button onclick="location.reload()" style="margin-top:20px;padding:10px 18px;background:#00A9E0;color:#fff;border:none;border-radius:6px;font-size:14px">Reintentar</button>
</div>
<script>
(function() {
  var diagLines = [];
  var diagShown = false;
  function yaEntroALaApp() {
    // Una vez que el usuario ya está dentro (app-shell visible), un error
    // suelto no debe tumbar toda la pantalla — solo durante el arranque.
    var appShell = document.getElementById('app-shell');
    return appShell && !appShell.classList.contains('hidden');
  }
  function showDiag() {
    if (diagShown || yaEntroALaApp()) return;
    diagShown = true;
    var splash = document.getElementById('splash-screen');
    if (splash) splash.style.display = 'none';
    var login = document.getElementById('login-screen');
    if (login) login.classList.add('hidden');
    var banner = document.getElementById('diag-banner');
    var text = document.getElementById('diag-text');
    if (text) text.textContent = diagLines.length ? diagLines.join('\n\n') : 'No se detectó un error específico, pero la carga tardó demasiado (posible falla de red o de firebase-config.js).';
    if (banner) banner.style.display = 'block';
  }
  window.addEventListener('error', function(e) {
    if (yaEntroALaApp()) { console.error('[OPTINET] Error capturado (no bloqueante):', e.message, e.filename, e.lineno); return; }
    diagLines.push('Error JS: ' + (e.message || 'desconocido') + '\nArchivo: ' + (e.filename || '?') + ' línea ' + (e.lineno || '?'));
    showDiag();
  });
  window.addEventListener('unhandledrejection', function(e) {
    if (yaEntroALaApp()) { console.error('[OPTINET] Promesa rechazada (no bloqueante):', e.reason); return; }
    diagLines.push('Promesa rechazada: ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
    showDiag();
  });
  // Si nada terminó de cargar en 12s, mostrar diagnóstico igual (red de seguridad extra)
  setTimeout(function() {
    var login = document.getElementById('login-screen');
    var loginVisible = login && !login.classList.contains('hidden');
    if (!loginVisible && !yaEntroALaApp()) showDiag();
  }, 12000);
})();
</script>

<!-- ========== SPLASH / CARGA ========== -->
<div id="splash-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#001E5C 0%,#0033A0 50%,#00A9E0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.5s">
  <div style="text-align:center;color:#fff">
    <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-bottom:16px">
      <circle cx="30" cy="30" r="28" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
      <path d="M15 30 Q22 18 30 30 Q38 42 45 30" stroke="#00A9E0" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="30" cy="30" r="4" fill="#fff"/>
    </svg>
    <div style="font-size:24px;font-weight:800;letter-spacing:2px;margin-bottom:6px">OPTINET</div>
    <div style="font-size:13px;opacity:0.7;margin-bottom:24px">Sistema de Gestión GPON</div>
    <div style="display:flex;gap:6px;justify-content:center">
      <div style="width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.2s ease-in-out infinite"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.2s ease-in-out 0.2s infinite"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.2s ease-in-out 0.4s infinite"></div>
    </div>
    <div id="splash-msg" style="font-size:12px;opacity:0.6;margin-top:12px">Conectando...</div>
  </div>
</div>
<style>
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
</style>

<!-- ========== LOGIN ========== -->
<div id="login-screen" class="hidden">

  'BELLA VISTA CPA','BETIJOQUE','BOLEITA','BTO.SANTA ISABEL','CAGUA',
  'CAMURI GRANDE','CARACAS CPA','CARICUAO_II','CENTRO NACIONAL','CHACAO',

  'CORO','CUMANA','CUMANACOA','EL CAFETAL_II','EL CALLAO','EL GURI',
  'EL HATILLO','EL TIGRE DIGITAL','ELORZA','FCO FAJARDO III',
  'FRANCISCO SALIAS','GUARENAS TRAPICHITO','GUASIPATI','GUATIRE','HIGUEROTE',
  'LA PASTORA','LA SABANITA','LA SALLE CPA','LA VICTORIA','LAS INDUSTRIAS',
  'LAS MERCEDES CPA','LECHERIAS','LOS CAOBOS','LOS OLIVOS','LOS TEQUES',
  'MACARACUAY','MARACAY CENTRO','MATURIN CPA','NAIGUATA','OCUMARE DEL TUY',
  'PABX-ANZOATEGUI','PARAGUAIPOA','PIRINEOS','PUERTO AYACUCHO II',
  'PURTO ORDAZ','REGISTRO DE CENTRAL NO EXISTE','RICARDO ZULOAGA',
  'SAN CARLOS','SAN CRISTOBAL CENTRO','SAN FELIPE','SAN FRANCISCO',
  'SAN MIGUEL','SAN RAFAEL-PORLAMAR','SANTA ELENA DE UAIREN','SN FERNADO DE APURE',
  'SN J LOS MORROS','SN.RAF.DEL MOJAN','TUCUPIDO','TUCUPITA','TUMEREMO',
  'UNARE','UPATA','URBINA','VALERA'

// ── Estados de Venezuela (23 estados + Distrito Capital) y sus centrales ────
const ESTADOS = ['AMAZONAS','ANZOATEGUI','APURE','ARAGUA','BARINAS','BOLIVAR','CARABOBO','COJEDES','DELTA AMACURO','DISTRITO CAPITAL','FALCON','GUARICO','LA GUAIRA','LARA','MERIDA','MIRANDA','MONAGAS','NUEVA ESPARTA','PORTUGUESA','SUCRE','TACHIRA','TRUJILLO','YARACUY','ZULIA'];

let ESTADO_CENTRALES = {
  'AMAZONAS': ['PUERTO AYACUCHO II'],
  'ANZOATEGUI': ['BARCELONA DIGITAL','EL TIGRE DIGITAL','LECHERIAS','PABX-ANZOATEGUI'],
  'APURE': ['ELORZA','SN FERNADO DE APURE'],
  'ARAGUA': ['CAGUA','COLONIA TOVAR','LA VICTORIA','MARACAY CENTRO'],
  'BARINAS': ['ALTO BARINAS'],
  'BOLIVAR': ['ALTAVISTA','EL CALLAO','EL GURI','GUASIPATI','LA SABANITA','PURTO ORDAZ','SANTA ELENA DE UAIREN','TUMEREMO','UNARE','UPATA'],
  'CARABOBO': ['CIUDAD ALIANZA'],
  'COJEDES': ['SAN CARLOS'],
  'DELTA AMACURO': ['TUCUPITA'],
  'DISTRITO CAPITAL': ['CARACAS CPA','CARICUAO_II','CENTRO NACIONAL','CHAGUARAMOS','COCHE','FCO FAJARDO III','LA PASTORA','LA SALLE CPA','LOS CAOBOS','RICARDO ZULOAGA'],

  'LA GUAIRA': ['CAMURI GRANDE','CIUDAD CARIBIA','NAIGUATA'],
  'LARA': ['BTO.SANTA ISABEL','REGISTRO DE CENTRAL NO EXISTE'],
  'MERIDA': [],
  'MIRANDA': ['BOLEITA','CHACAO','EL CAFETAL_II','EL HATILLO','FRANCISCO SALIAS','GUARENAS TRAPICHITO','GUATIRE','HIGUEROTE','LAS MERCEDES CPA','LOS TEQUES','MACARACUAY','OCUMARE DEL TUY','URBINA'],
  'MONAGAS': ['MATURIN CPA'],
  'NUEVA ESPARTA': ['SAN RAFAEL-PORLAMAR'],
  'PORTUGUESA': ['ACARIGUA'],

  'TRUJILLO': ['BETIJOQUE','VALERA'],

  'ZULIA': ['BELLA VISTA CPA','LAS INDUSTRIAS','LOS OLIVOS','PARAGUAIPOA','SAN FRANCISCO','SAN MIGUEL','SN.RAF.DEL MOJAN']
};

// Normaliza variantes de nombres de estado que llegan de los Excel
function normalizarEstado(nombre) {
  if (!nombre) return '';
  const n = String(nombre).trim().toUpperCase();
  if (n === 'BOLIVARIANO MIRANDA') return 'MIRANDA';
  return n;
}

// Ordena ZONES alfabéticamente pero siempre deja "900 AVANZADO" de último
function reordenarZonas() {
  ZONES.sort();
  const idx = ZONES.indexOf('900 AVANZADO');
  if (idx !== -1) { ZONES.splice(idx, 1); ZONES.push('900 AVANZADO'); }
  Object.values(ESTADO_CENTRALES).forEach(arr => {
    arr.sort();
    const i = arr.indexOf('900 AVANZADO');
    if (i !== -1) { arr.splice(i, 1); arr.push('900 AVANZADO'); }
  });
}
reordenarZonas();

// Registra una central nueva (detectada al cargar un Excel) tanto en la lista
// plana de zonas como bajo su estado correspondiente, y la persiste en DB
// para que no se pierda al recargar la página.
function registrarCentralNueva(central, estado) {
  if (!central) return false;
  central = String(central).trim().toUpperCase();
  let esNueva = false;
  if (!ZONES.includes(central)) { ZONES.push(central); esNueva = true; }

  let est = normalizarEstado(estado);
  if (!est || !ESTADOS.includes(est)) est = 'SIN CLASIFICAR';
  if (!ESTADO_CENTRALES[est]) ESTADO_CENTRALES[est] = [];
  if (!ESTADO_CENTRALES[est].includes(central)) { ESTADO_CENTRALES[est].push(central); esNueva = true; }

  if (esNueva) {
    if (!DB.zonas_extra_detectadas) DB.zonas_extra_detectadas = [];
    if (!DB.zonas_extra_detectadas.includes(central)) DB.zonas_extra_detectadas.push(central);
    if (!DB.estado_centrales_extra) DB.estado_centrales_extra = {};
    if (!DB.estado_centrales_extra[est]) DB.estado_centrales_extra[est] = [];
    if (!DB.estado_centrales_extra[est].includes(central)) DB.estado_centrales_extra[est].push(central);
  }
  return esNueva;
}

// Aplica a ZONES/ESTADO_CENTRALES las centrales nuevas que ya se habían
// detectado y guardado en sesiones anteriores (localStorage / Firestore)
function aplicarZonasExtraGuardadas() {
  (DB.zonas_extra_detectadas || []).forEach(z => { if (!ZONES.includes(z)) ZONES.push(z); });
  Object.entries(DB.estado_centrales_extra || {}).forEach(([estado, centrales]) => {
    if (!ESTADO_CENTRALES[estado]) ESTADO_CENTRALES[estado] = [];
    centrales.forEach(c => { if (!ESTADO_CENTRALES[estado].includes(c)) ESTADO_CENTRALES[estado].push(c); });
  });
  reordenarZonas();
}

/* ============================================================
   FIREBASE PERSISTENCE — loadDB, saveDB, syncDB
   ============================================================ */
let _fbListeners = [];
let _fbSyncEnabled = false;

function loadDB() {
  // Cargar desde localStorage como fallback inmediato
  let saved = localStorage.getItem('optinet_db_v1');
  if (!saved) {
    const oldSaved = localStorage.getItem('gpon_db_v3');
    if (oldSaved) { saved = oldSaved; }
  }
  if (saved) {
    try {
      DB = JSON.parse(saved);
      const def = getDefaultDB();
      if (!DB.users || DB.users.length === 0) DB.users = def.users;
      if (!DB.averias) DB.averias = [];
      if (!DB.ordenes) DB.ordenes = [];
      if (!DB.historial) DB.historial = [];
      if (!DB.odn_extra) DB.odn_extra = [];
      if (!DB.cuadrillas) DB.cuadrillas = [];
      if (!DB.zonas_extra_detectadas) DB.zonas_extra_detectadas = [];
      if (!DB.estado_centrales_extra) DB.estado_centrales_extra = {};
      DB.users = DB.users.map(u => u.role === 'admin' ? {...u, role: 'gerente_general'} : u);
      if (!DB.users.find(u => u.role === 'gerente_general')) {
        DB.users.unshift({user:'gerente', pass:'gerente123', role:'gerente_general', name:'Gerente General OPTINET', zona:'Todas', cuadrilla:'', email:'gerente@optinet.ve'});
      }
      DB.averias = DB.averias.map(a => ({...a, estado_gestion: a.estado_gestion||'Abierta', asignado_a: a.asignado_a||'', ot_asignada: a.ot_asignada||''}));
    } catch(e) { DB = getDefaultDB(); }
  } else {
    DB = getDefaultDB();
  }
  aplicarZonasExtraGuardadas();
  localStorage.setItem('optinet_db_v1', JSON.stringify(DB));
  // Iniciar sincronización Firebase si está disponible
  if (window._FB_READY) {
    initFirebaseSync();
  } else {
    document.addEventListener('firebase-ready', () => initFirebaseSync(), { once: true });
  }
}

function saveDB() {
  if (!DB.cuadrillas) DB.cuadrillas = [];
  localStorage.setItem('optinet_db_v1', JSON.stringify(DB));
  // Sincronizar con Firestore si está disponible y hay sesión activa
  if (window._FB_READY && window._FB.auth.currentUser) {
    pushToFirestore().catch(e => console.warn('Firestore sync error:', e));
  }
}

async function pushToFirestore() {
  const { db, doc, setDoc } = window._FB;
  const uid = window._FB.auth.currentUser?.uid;
  if (!uid) return;
  // Guardar datos globales (no por usuario, sino por organización)
  await setDoc(doc(db, 'optinet', 'main_db'), {
    averias: DB.averias || [],
    ordenes: DB.ordenes || [],
    historial: (DB.historial || []).slice(-200), // últimos 200 registros
    odn_extra: DB.odn_extra || [],
    cuadrillas: DB.cuadrillas || [],
    users: DB.users || [],
    zonas_extra_detectadas: DB.zonas_extra_detectadas || [],
    estado_centrales_extra: DB.estado_centrales_extra || {},
    updated_at: new Date().toISOString(),
    updated_by: uid
  });
}

async function pullFromFirestore() {
  const { db, doc, getDoc } = window._FB;
  try {
    const snap = await getDoc(doc(db, 'optinet', 'main_db'));
    if (snap.exists()) {
      const data = snap.data();
      if (data.averias) DB.averias = data.averias;
      if (data.ordenes) DB.ordenes = data.ordenes;
      if (data.historial) DB.historial = data.historial;
      if (data.odn_extra) DB.odn_extra = data.odn_extra;
      if (data.cuadrillas) DB.cuadrillas = data.cuadrillas;
      if (data.users && data.users.length > 0) DB.users = data.users;
      if (data.zonas_extra_detectadas) DB.zonas_extra_detectadas = data.zonas_extra_detectadas;
      if (data.estado_centrales_extra) DB.estado_centrales_extra = data.estado_centrales_extra;
      aplicarZonasExtraGuardadas();
      DB.averias = DB.averias.map(a => ({...a, estado_gestion: a.estado_gestion||'Abierta', asignado_a: a.asignado_a||'', ot_asignada: a.ot_asignada||''}));
      localStorage.setItem('optinet_db_v1', JSON.stringify(DB));
      console.log('✅ Datos sincronizados desde Firestore');
      return true;
    }
  } catch(e) {
    console.warn('Error al leer Firestore:', e);
  }
  return false;
}

function initFirebaseSync() {
  if (_fbSyncEnabled) return;
  _fbSyncEnabled = true;
  const { db, doc, onSnapshot } = window._FB;
  // Escuchar cambios en tiempo real
  const unsub = onSnapshot(doc(db, 'optinet', 'main_db'), (snap) => {
    if (!snap.exists()) return;
    const data = snap.data();
    const myUid = window._FB.auth.currentUser?.uid;
    // No procesar si el cambio lo hicimos nosotros (evitar loop)
    if (data.updated_by === myUid) return;
    // Actualizar DB local con datos de Firestore
    if (data.averias) DB.averias = data.averias;
    if (data.ordenes) DB.ordenes = data.ordenes;
    if (data.historial) DB.historial = data.historial;
    if (data.odn_extra) DB.odn_extra = data.odn_extra;
    if (data.cuadrillas) DB.cuadrillas = data.cuadrillas;
    if (data.users && data.users.length > 0) DB.users = data.users;
    if (data.zonas_extra_detectadas) DB.zonas_extra_detectadas = data.zonas_extra_detectadas;
    if (data.estado_centrales_extra) DB.estado_centrales_extra = data.estado_centrales_extra;
    aplicarZonasExtraGuardadas();
    DB.averias = DB.averias.map(a => ({...a, estado_gestion: a.estado_gestion||'Abierta', asignado_a: a.asignado_a||'', ot_asignada: a.ot_asignada||''}));
    localStorage.setItem('optinet_db_v1', JSON.stringify(DB));
    // Refrescar la vista actual si hay sesión activa
    if (SESSION && window._currentView) {
      destroyCharts(); // evita el error "Canvas is already in use" de Chart.js
      renderView(window._currentView);
      // Actualizar badges del nav
      document.querySelectorAll('.nav-badge').forEach(b => {
        const navId = b.closest('[data-nav]')?.dataset?.nav;
        if (navId) {
          const item = [...(SESSION.role==='gerente_general'?NAV_ADMIN:SESSION.role==='gerente_zona'?NAV_GERENTE:NAV_TECNICO)].find(n=>n.id===navId);
          if (item?.badge) b.textContent = item.badge() || '';
        }
      });
      console.log('🔄 Vista actualizada por cambio en tiempo real');
    }
  }, (err) => {
    console.warn('Firestore listener error:', err);
  });
  _fbListeners.push(unsub);
}

/* ============================================================
   AUTH
   ============================================================ */
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  if (!u || !p) { showLoginError('Ingrese usuario y contraseña'); return; }

  const loginBtn = document.querySelector('#login-screen .btn-primary');
  if (loginBtn) { loginBtn.disabled = true; loginBtn.textContent = 'Iniciando sesión...'; }

  // Primero intentar con Firebase Auth (email derivado del usuario)
  const email = u.includes('@') ? u : (u + '@optinet.ve');

  try {
    if (window._FB_READY) {
      const { auth, signInWithEmailAndPassword, db } = window._FB;
      try {
        const cred = await signInWithEmailAndPassword(auth, email, p);
        // Obtener perfil del usuario desde Firestore
        const { doc, getDoc } = window._FB;
        const userSnap = await getDoc(doc(db, 'optinet_users', cred.user.uid));
        let userProfile = null;
        if (userSnap.exists()) {
          userProfile = userSnap.data();
        } else {
          // Buscar en DB local como fallback
          userProfile = DB.users.find(x => x.user === u || x.email === email);
        }
        if (!userProfile) {
          // Crear perfil básico si no existe
          userProfile = DB.users.find(x => x.user === u) || { user: u, role: 'tecnico', name: u, zona: '', cuadrilla: '', email };
        }
        // Sincronizar datos desde Firestore antes de mostrar la app
        await pullFromFirestore();
        // Actualizar perfil con datos más recientes de DB
        const freshProfile = DB.users.find(x => x.user === u || x.email === email) || userProfile;
        completarLogin(freshProfile);
        return;
      } catch(authErr) {
        // Si Firebase Auth falla, intentar con credenciales locales
        if (authErr.code === 'auth/user-not-found' || authErr.code === 'auth/wrong-password' || authErr.code === 'auth/invalid-credential') {
          // Fallback a autenticación local
          const found = DB.users.find(x => x.user === u && x.pass === p);
          if (found) {
            // Intentar registrar el usuario en Firebase Auth para futuros logins
            try {
              const { createUserWithEmailAndPassword, db: fdb, doc: fdoc, setDoc: fsetDoc } = window._FB;
              const newCred = await createUserWithEmailAndPassword(auth, email, p);
              await fsetDoc(fdoc(fdb, 'optinet_users', newCred.user.uid), {
                user: found.user, email, role: found.role, name: found.name,
                zona: found.zona, cuadrilla: found.cuadrilla||'', uid: newCred.user.uid
              });
              // Actualizar usuario local con email y uid
              found.email = email;
              found.uid = newCred.user.uid;
              await pushToFirestore();
            } catch(regErr) {
              console.warn('No se pudo registrar en Firebase Auth:', regErr.message);
            }
            completarLogin(found);
            return;
          }
        } else if (authErr.code === 'auth/network-request-failed') {
          // Sin conexión: usar autenticación local
          const found = DB.users.find(x => x.user === u && x.pass === p);
          if (found) { completarLogin(found); return; }
        }
        console.warn('Firebase Auth error:', authErr.code, authErr.message);
      }
    }
    // Fallback final: autenticación local
    const found = DB.users.find(x => x.user === u && x.pass === p);
    if (!found) {
      showLoginError('Usuario o contraseña incorrectos');
      if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = 'Iniciar Sesión'; }
      return;
    }
    completarLogin(found);
  } catch(e) {
    console.error('Login error:', e);
    showLoginError('Error al iniciar sesión. Intente de nuevo.');
    if (loginBtn) { loginBtn.disabled = false; loginBtn.textContent = 'Iniciar Sesión'; }
  }
}

function showLoginError(msg) {
  let errEl = document.getElementById('login-error');
  if (!errEl) {
    errEl = document.createElement('div');
    errEl.id = 'login-error';
    errEl.style.cssText = 'color:#C62828;background:#FFEBEE;border-radius:6px;padding:10px 14px;font-size:13px;margin-top:10px;text-align:center';
    const btn = document.querySelector('#login-screen .btn-primary');
    if (btn) btn.parentNode.insertBefore(errEl, btn.nextSibling);
  }
  errEl.textContent = msg;
  errEl.style.display = 'block';
  setTimeout(() => { if (errEl) errEl.style.display = 'none'; }, 4000);
}

/* ============================================================
   SESIÓN PERSISTENTE OFFLINE
   Guarda el perfil (sin contraseña) localmente para que el
   usuario no tenga que volver a autenticar contra Firebase
   cada vez que reabre la app sin señal.
   ============================================================ */
const SESSION_STORAGE_KEY = 'optinet_session_v1';
const SESSION_MAX_AGE_MS = 30 * 24 * 60 * 60 * 1000; // 30 días

function guardarSesionLocal(profile) {
  try {
    // Nunca guardar la contraseña en la sesión persistida
    const { pass, ...safeProfile } = profile;
    localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify({ profile: safeProfile, ts: Date.now() }));
  } catch(e) { console.warn('No se pudo guardar sesión local:', e); }
}

function restaurarSesionLocal() {
  try {
    const raw = localStorage.getItem(SESSION_STORAGE_KEY);
    if (!raw) return null;
    const { profile, ts } = JSON.parse(raw);
    if (!profile || !ts) return null;
    if (Date.now() - ts > SESSION_MAX_AGE_MS) { localStorage.removeItem(SESSION_STORAGE_KEY); return null; }
    return profile;
  } catch(e) { return null; }
}

function limpiarSesionLocal() {
  try { localStorage.removeItem(SESSION_STORAGE_KEY); } catch(e) {}
}

function completarLogin(found) {
  SESSION = found;
  guardarSesionLocal(found);
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-shell').classList.remove('hidden');
  document.getElementById('header-name').textContent = found.name;
  const roleLabels = {
    'gerente_general': 'Gerente General',
    'gerente_zona': `Gerente de Zona · ${found.zona}`,
    'tecnico': `Técnico · ${found.zona}`
  };
  document.getElementById('header-role').textContent = roleLabels[found.role] || found.role;
  buildNav();
  // Iniciar sincronización en tiempo real
  if (window._FB_READY && !_fbSyncEnabled) initFirebaseSync();
  // Mostrar indicador de sincronización
  const syncInd = document.getElementById('sync-indicator');
  if (syncInd) {
    syncInd.style.display = 'block';
    syncInd.title = window._FB_READY ? 'Sincronizado con la nube' : 'Modo local (sin conexión)';
    syncInd.style.background = window._FB_READY ? 'var(--green)' : 'var(--orange)';
  }
}

async function doLogout() {
  // Detener listeners de Firestore
  _fbListeners.forEach(unsub => { try { unsub(); } catch(e) {} });
  _fbListeners = [];
  _fbSyncEnabled = false;
  // Cerrar sesión en Firebase
  if (window._FB_READY && window._FB.auth.currentUser) {
    try { await window._FB.signOut(window._FB.auth); } catch(e) {}
  }
  limpiarSesionLocal();
  SESSION = null;
  location.reload();
}

function buildNav() {
  let items;
  if (SESSION.role === 'gerente_general') {
    items = NAV_ADMIN;
  } else if (SESSION.role === 'gerente_zona') {
    items = NAV_GERENTE_ZONA;
  } else {
    items = NAV_TECNICO;
  }
  const nav = document.getElementById('nav-items');
  nav.innerHTML = '';
  let currentSection = '';
  items.forEach(item => {
    if (item.section !== currentSection) {
      currentSection = item.section;
      const sec = document.createElement('div');
      sec.className = 'sidebar-section';
      sec.innerHTML = `<div class="sidebar-section-label">${item.section}</div>`;
      nav.appendChild(sec);
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.dataset.view = item.id;
    const badgeCount = item.badge ? item.badge() : 0;
    btn.innerHTML = `${item.icon}<span>${item.label}</span>${badgeCount > 0 ? `<span class="nav-badge">${badgeCount}</span>` : ''}`;
    btn.onclick = () => { navigateTo(item.id); closeSidebar(); };
    nav.appendChild(btn);
  });
  navigateTo(items[0].id);
}

function navigateTo(view) {
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.view === view);
  });
  destroyCharts();
  renderView(view);
}

function destroyCharts() {
  Object.values(activeCharts).forEach(ch => { try { ch.destroy(); } catch(e){} });
  activeCharts = {};
  // Reset bulk selection when navigating away
  if (typeof _avSeleccionadas !== 'undefined') _avSeleccionadas.clear();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');

/* ============================================================
   KPI CALCULATION
   ============================================================ */
function calcKPIs(zonaFilter) {
  // Filter data by zone if gerente_zona
  const filtroZona = zonaFilter || (SESSION && SESSION.role === 'gerente_zona' ? SESSION.zona : null);
  const averias = filtroZona ? DB.averias.filter(a => a.zona === filtroZona) : DB.averias;
  const ordenes = filtroZona ? DB.ordenes.filter(o => o.zona === filtroZona) : DB.ordenes;
  const otCerradas = ordenes.filter(o => o.estado === 'Completada');
  const otCorrectivas = otCerradas.filter(o => o.tipo === 'Correctivo');

  // ---- MTTR: Tiempo Medio de Reparación ----
  // Solo OTs correctivas con fecha_inicio y fecha_cierre válidas
  let totalRep = 0, countRep = 0;
  otCorrectivas.forEach(o => {
    if (o.fecha_inicio && o.fecha_cierre) {
      const inicio = new Date(o.fecha_inicio.replace(' ', 'T'));
      const cierre = new Date(o.fecha_cierre.replace(' ', 'T'));
      const t = (cierre - inicio) / 3600000; // horas
      if (t > 0 && t < 720) { totalRep += t; countRep++; }
    }
  });
  // Si no hay datos reales, estimar desde días_transcurridos de averías cerradas
  if (countRep === 0) {
    const averiasCerradas = averias.filter(a => a.estado_gestion === 'Cerrada');
    if (averiasCerradas.length > 0) {
      // Promedio de días transcurridos como estimación
      const totalDias = averiasCerradas.reduce((s, a) => s + (parseFloat(a.dias_transcurridos) || 0), 0);
      totalRep = (totalDias / averiasCerradas.length) * 24; // convertir días a horas
      countRep = 1;
    } else {
      // Fallback con datos de muestra representativos
      totalRep = 4.5; countRep = 1;
    }
  }
  const MTTR = countRep > 0 ? totalRep / countRep : 4.5;

  // ---- MTBF: Tiempo Medio Entre Fallas ----
  // MTBF = Tiempo total operativo / Número de fallas
  // Período de análisis: últimos 90 días (2160 horas) por zona
  const periodoHoras = 2160; // 90 días
  const numFallas = Math.max(averias.length, 1);
  const tiempoInactivo = MTTR * numFallas; // estimación tiempo total inactivo
  const tiempoOperativo = Math.max(periodoHoras - tiempoInactivo, periodoHoras * 0.5);
  const MTBF = tiempoOperativo / numFallas;

  // ---- Disponibilidad ----
  // Disp = (MTBF / (MTBF + MTTR)) * 100
  const Disp = (MTBF / (MTBF + MTTR)) * 100;

  // ---- CPP: Cumplimiento del Plan Preventivo ----
  const prog = ordenes.filter(o => o.programada && o.tipo === 'Preventivo');
  const progDone = prog.filter(o => o.estado === 'Completada');
  const CPP = prog.length ? (progDone.length / prog.length) * 100 : 0;

  // ---- Éxito de Empalmes (atenuación ≤ 0.1 dB) ----
  const conAtten = otCerradas.filter(o => {
    const pd = o.planilla_data;
    return pd && (pd.att_despues || pd.atten) && parseFloat(pd.att_despues || pd.atten) > 0;
  });
  const okEmp = conAtten.filter(o => {
    const pd = o.planilla_data;
    return parseFloat(pd.att_despues || pd.atten || '99') <= 0.1;
  });
  const exitoEmp = conAtten.length ? (okEmp.length / conAtten.length) * 100 : 0;

  // ---- Averías por zona ----
  const byZone = {};
  ZONES.forEach(z => byZone[z] = DB.averias.filter(a => a.zona && a.zona.trim() === z).length);

  // ---- Averías por tipo ----
  const byType = {};
  averias.forEach(a => {
    const t = a.tipo_problema || 'Otro';
    byType[t] = (byType[t] || 0) + 1;
  });

  // ---- OTs por estado ----
  const byStatus = { Pendiente: 0, 'En Proceso': 0, Completada: 0 };
  ordenes.forEach(o => { byStatus[o.estado] = (byStatus[o.estado] || 0) + 1; });

  // ---- Estadísticas adicionales ----
  const averiasAbiertas = averias.filter(a => a.estado_gestion === 'Abierta').length;
  const averiasCriticas = averias.filter(a => a.severidad === 1 && a.estado_gestion === 'Abierta').length;
  const tasaResolucion = averias.length > 0 ?
    (averias.filter(a => a.estado_gestion === 'Cerrada').length / averias.length) * 100 : 0;

  return {
    MTTR: isFinite(MTTR) ? MTTR : 4.5,
    MTBF: isFinite(MTBF) ? MTBF : 720,
    Disp: isFinite(Disp) ? Math.min(Disp, 100) : 99.5,
    CPP,
    exitoEmp,
    N: numFallas,
    byZone,
    byType,
    byStatus,
    averiasAbiertas,
    averiasCriticas,
    tasaResolucion
  };
}

function kpiClass(v, target, inverse=false) {
  if (inverse) return v <= target ? 'kpi-good' : (v <= target * 1.5 ? 'kpi-warn' : 'kpi-bad');
  return v >= target ? 'kpi-good' : (v >= target * 0.9 ? 'kpi-warn' : 'kpi-bad');
}

function kpiCard(label, value, target, cls) {
  const badge = cls === 'kpi-good' ? '<span class="kpi-badge badge-ok">CUMPLE</span>' :

                cls === 'kpi-bad'  ? '<span class="kpi-badge badge-bad">CRÍTICO</span>' : '';
  return `<div class="kpi-card ${cls}"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div><div class="kpi-target">${target} ${badge}</div></div>`;
}

function statusBadge(ok) {
  return ok ? '<span class="pill pill-done">Cumple</span>' : '<span class="pill pill-crit">No Cumple</span>';
}

function renderOrdenesAdmin(c) {

function switchOTTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['crear','activas','completadas'].forEach(t => {
    document.getElementById(`ot-tab-${t}`).classList.toggle('hidden', t !== tab);
  });
}

function updateOTForm() {
  const tipo = document.getElementById('ot-tipo').value;
  document.getElementById('ot-actividad-block').classList.toggle('hidden', tipo === 'Correctivo');
  document.getElementById('ot-averia-block').classList.toggle('hidden', tipo !== 'Correctivo');
  document.getElementById('ot-prog-row').classList.toggle('hidden', tipo === 'Correctivo');
}

function seleccionarZonaOT(zona) {
  const input = document.getElementById('ot-zona-search');
  if (input) input.value = zona || '';
  const list = document.getElementById('ot-zona-list');
  if (list) {
    list.style.display = 'none';
    list.querySelectorAll('.zona-opt').forEach(el => {
      const isSelected = el.textContent.trim() === zona;
      el.style.background = isSelected ? 'var(--blue)' : '';
      el.style.color = isSelected ? '#fff' : '';
    });
  }
  updateOTAveriasFilter();
  updateOTTecFilter();
}

function updateOTAveriasFilter() {
  const zona = document.getElementById('ot-zona-search')?.value || document.getElementById('ot-zona')?.value || '';
  const sel = document.getElementById('ot-averia-sel');
  if (!sel) return;
  // Only show unassigned averias for the selected zone
  const avs = DB.averias.filter(a => a.estado_gestion === 'Abierta' && !a.asignado_a && (!zona || a.zona === zona));
  sel.innerHTML = '<option value="">-- Seleccionar avería --</option>' +
    avs.map(a=>`<option value="${a.id_averia}">[${a.zona}] ${a.id_averia} — ${a.nombre} — ${a.problema_reporte||a.descripcion}</option>`).join('');
}

function updateOTTecFilter() {
  const zona = document.getElementById('ot-zona-search')?.value || document.getElementById('ot-zona')?.value || '';
  const sel = document.getElementById('ot-tec');
  if (!sel || !zona) return;
  // Filter techs by selected zone
  const tecsZona = DB.users.filter(u => (u.role === 'tecnico' || u.role === 'gerente_zona') && u.zona === zona);
  if (tecsZona.length === 0) {
    // Fall back to all techs if no match
    const allTecs = DB.users.filter(u => u.role === 'tecnico');
    sel.innerHTML = allTecs.map(t=>`<option value="${t.user}">${t.name} · ${t.zona}</option>`).join('');
  } else {
    sel.innerHTML = tecsZona.map(t=>`<option value="${t.user}">${t.name} · ${t.zona}${t.cuadrilla?' ('+t.cuadrilla+')':''}</option>`).join('');
  }
}

function fillAveriaData() {
  const id = document.getElementById('ot-averia-sel').value;
  const preview = document.getElementById('averia-preview');
  if (!id) { preview.style.display='none'; return; }
  const av = DB.averias.find(a => a.id_averia === id);
  if (!av) return;
  preview.style.display='flex';
  preview.innerHTML = `<strong>Avería ${av.id_averia}:</strong>&nbsp; ${av.nombre} · ${av.direccion} · Plan: ${av.plan} · FAT: ${av.fat} · OLT: ${av.olt} Puerto ${av.puerto}`;
  // Auto-fill FAT
  if (document.getElementById('ot-fat')) document.getElementById('ot-fat').value = av.fat || '';
  // Auto-detect MC procedure
  const mc = document.getElementById('ot-mc');
  if (mc && av.tipo_problema) {
    const cat = FAULT_CATEGORIES[av.tipo_problema];
    if (cat && cat.proc) mc.value = cat.proc;
  }
}

function renderOTTable(type) {
  const isActiva = type === 'activas';
  const zonaFilt = document.getElementById('filt-ot-zona-search')?.value || document.getElementById('filt-ot-zona')?.value || '';
  const tipoFilt = document.getElementById('filt-ot-tipo')?.value || '';
  let ots = DB.ordenes.filter(o => isActiva ? o.estado !== 'Completada' : o.estado === 'Completada');
  if (zonaFilt) ots = ots.filter(o => o.zona === zonaFilt);
  if (tipoFilt) ots = ots.filter(o => o.tipo === tipoFilt);
  const el = document.getElementById(`ot-${type}-table`);
  if (!el) return;
  if (!ots.length) { el.innerHTML = '<p style="color:var(--txt-muted);padding:16px">No hay órdenes en esta categoría.</p>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>ID</th><th>Tipo</th><th>Actividad</th><th>Zona</th><th>Técnico</th><th>FAT/Elemento</th><th>Fecha</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody>${ots.map(o => {
      const tec = DB.users.find(u => u.user === o.tecnico);
      const pill = o.estado === 'Pendiente' ? 'pill-pend' : o.estado === 'En Proceso' ? 'pill-prog' : 'pill-done';
      const actLabel = o.tipo === 'Preventivo' ? (PREV_ACTIVITIES[o.actividad]?.label || o.actividad) : (CORR_PROCEDURES[o.actividad] || o.actividad);
      return `<tr>
        <td><strong>${o.id}</strong></td>
        <td><span class="pill ${o.tipo==='Preventivo'?'pill-prev':'pill-corr'}">${o.tipo}</span></td>
        <td style="max-width:200px;font-size:12px">${actLabel}</td>
        <td>${o.zona}</td>
        <td>${tec ? tec.name : o.tecnico}</td>
        <td style="font-size:12px">${o.fat}</td>
        <td>${o.fecha}</td>
        <td><span class="pill ${pill}">${o.estado}</span></td>
        <td><button class="btn btn-sm btn-outline" onclick="verOT('${o.id}')">${iconEye()} Ver</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

function crearOT() {
  const tipo = document.getElementById('ot-tipo').value;
  const zona = document.getElementById('ot-zona-search')?.value || document.getElementById('ot-zona')?.value || '';
  const tec  = document.getElementById('ot-tec').value;
  let actividad, fat, fecha, detalle, averia_id = '';

  if (tipo === 'Preventivo') {
    actividad = document.getElementById('ot-actividad').value;
    fat       = document.getElementById('ot-fat').value || '-';
    fecha     = document.getElementById('ot-fecha').value;
    detalle   = document.getElementById('ot-detalle').value;
  } else {
    const avSel = document.getElementById('ot-averia-sel').value;
    actividad = document.getElementById('ot-mc').value;
    fecha     = document.getElementById('ot-fecha-c').value;
    detalle   = document.getElementById('ot-detalle').value;
    if (avSel) {
      const av = DB.averias.find(a => a.id_averia === avSel);
      if (av) { fat = av.fat || '-'; averia_id = av.id_averia; detalle = `Avería ${av.id_averia} — ${av.nombre} — ${av.problema_reporte||av.descripcion}. ${detalle}`; }
    } else {
      fat = '-';
    }
  }

  // Generate sequential OT ID based on max existing ID
  const maxId = DB.ordenes.reduce((max, o) => {
    const num = parseInt(o.id.replace('OT-','')) || 0;
    return Math.max(max, num);
  }, 0);
  const id = 'OT-' + String(maxId + 1).padStart(3,'0');
  const prog = tipo === 'Preventivo' && document.getElementById('ot-prog')?.checked;
  DB.ordenes.push({ id, tipo, actividad, zona, tecnico: tec, fat, estado: 'Pendiente', programada: prog, fecha, detalle, atten: '', resultado: '', planilla_data: {}, fecha_inicio: '', fecha_cierre: '', averia_id });
  // Mark averia as assigned
  if (averia_id) {
    const av = DB.averias.find(a => a.id_averia === averia_id);
    if (av) { av.ot_asignada = id; av.asignado_a = tec; }
  }
  addHistorial('ot_creada', { ot: id, tipo, zona, tecnico: tec, actividad });
  saveDB();
  alert(`Orden ${id} enviada al técnico ${DB.users.find(u=>u.user===tec)?.name}`);
  renderView('ordenes');
}

function verOT(id) {
  const o = DB.ordenes.find(x => x.id === id);
  if (!o) return;
  const tec = DB.users.find(u => u.user === o.tecnico);
  const actLabel = o.tipo === 'Preventivo' ? (PREV_ACTIVITIES[o.actividad]?.label || o.actividad) : (CORR_PROCEDURES[o.actividad] || o.actividad);
  showModal(`Orden ${o.id}`, `
    <div class="odn-detail-grid">
      <div class="odn-detail-item"><label>Tipo</label><span>${o.tipo}</span></div>
      <div class="odn-detail-item"><label>Estado</label><span class="pill ${o.estado==='Pendiente'?'pill-pend':o.estado==='En Proceso'?'pill-prog':'pill-done'}">${o.estado}</span></div>
      <div class="odn-detail-item"><label>Actividad</label><span style="font-size:12px">${actLabel}</span></div>
      <div class="odn-detail-item"><label>Zona</label><span>${o.zona}</span></div>
      <div class="odn-detail-item"><label>Técnico</label><span>${tec?.name || o.tecnico}</span></div>
      <div class="odn-detail-item"><label>FAT / Elemento</label><span>${o.fat}</span></div>
      <div class="odn-detail-item"><label>Fecha Programada</label><span>${o.fecha}</span></div>
      <div class="odn-detail-item"><label>Inicio</label><span>${o.fecha_inicio || '—'}</span></div>
      <div class="odn-detail-item"><label>Cierre</label><span>${o.fecha_cierre || '—'}</span></div>
      ${o.atten ? `<div class="odn-detail-item"><label>Atenuación medida</label><span>${o.atten} dB</span></div>` : ''}
    </div>
    <div style="margin-top:12px"><strong>Detalle:</strong><br><span style="font-size:13px;color:var(--txt-muted)">${o.detalle || '—'}</span></div>
    ${o.resultado ? `<div style="margin-top:10px"><strong>Resultado:</strong><br><span style="font-size:13px;color:var(--green)">${o.resultado}</span></div>` : ''}
    ${o.planilla_data && Object.keys(o.planilla_data).length > 0 ? renderPlanillaResumen(o.planilla_data) : ''}
  `);
}

function addHistorial(tipo, data) {
  DB.historial.push({ tipo, data, fecha: new Date().toISOString(), user: SESSION?.user || 'sistema' });
}

function renderHistorial(c) {
  c.innerHTML = `
  <div class="page-header">
    <div>
      <div class="page-title">Historial de Actividades</div>
      <div class="page-sub">Registro cronológico de todas las operaciones del sistema</div>
    </div>
  </div>
  <div class="filter-bar">
    <input type="date" id="hist-desde" placeholder="Desde">
    <input type="date" id="hist-hasta" placeholder="Hasta">
    <select id="hist-tipo">
      <option value="">Todos los tipos</option>
      <option value="ot_creada">OT Creada</option>
      <option value="ot_completada">OT Completada</option>
      <option value="averia_cerrada">Avería Cerrada</option>
      <option value="carga_datos">Carga de Datos</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="filtrarHistorial()">Filtrar</button>
    <button class="btn btn-outline btn-sm" onclick="exportHistorial()">Exportar</button>
  </div>
  <div id="hist-content">
    ${renderHistorialContent(DB.historial)}
  </div>`;
}

function renderHistorialContent(items) {
  if (!items.length) return '<div class="card"><p style="color:var(--txt-muted)">No hay registros en el historial.</p></div>';
  const sorted = [...items].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
  return sorted.map(h => {
    const fecha = new Date(h.fecha).toLocaleString('es-VE');
    const user = DB.users.find(u => u.user === h.user)?.name || h.user;
    let icon, desc, color;
    switch(h.tipo) {
      case 'ot_creada':     icon='&#9998;'; desc=`OT ${h.data?.ot} creada — ${h.data?.tipo} · ${h.data?.zona}`; color='var(--blue)'; break;
      case 'ot_completada': icon='&#10003;'; desc=`OT ${h.data?.ot} completada`; color='var(--green)'; break;
      case 'averia_cerrada':icon='&#10003;'; desc=`Avería ${h.data?.id} cerrada`; color='var(--green)'; break;
      case 'carga_datos':   icon='&#8679;'; desc=`Datos cargados: ${h.data?.tipo} (${h.data?.count} registros)`; color='var(--cyan)'; break;
      case 'averia_asignada': icon='&#9654;'; desc=`Avería ${h.data?.id} asignada a ${h.data?.tecnico} (${h.data?.zona})`; color='var(--blue)'; break;
      default:              icon='&#9679;'; desc=JSON.stringify(h.data); color='var(--txt-muted)';
    }
    return `<div class="card" style="padding:14px 18px;margin-bottom:10px;border-left:3px solid ${color}">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px;color:${color}">${icon}</span>
          <div>
            <div style="font-size:13px;font-weight:600">${desc}</div>
            <div style="font-size:11px;color:var(--txt-muted)">Por: ${user}</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--txt-muted);white-space:nowrap">${fecha}</div>
      </div>
    </div>`;
  }).join('');
}

function filtrarHistorial() {
  const desde = document.getElementById('hist-desde').value;
  const hasta = document.getElementById('hist-hasta').value;
  const tipo  = document.getElementById('hist-tipo').value;
  let items = DB.historial;
  if (desde) items = items.filter(h => h.fecha >= desde);
  if (hasta) items = items.filter(h => h.fecha <= hasta + 'T23:59:59');
  if (tipo)  items = items.filter(h => h.tipo === tipo);
  document.getElementById('hist-content').innerHTML = renderHistorialContent(items);
}

function exportHistorial() {
  const lines = DB.historial.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(h => {
    const fecha = new Date(h.fecha).toLocaleString('es-VE');
    return `${fecha} | ${h.tipo} | ${h.user} | ${JSON.stringify(h.data)}`;
  });
  const blob = new Blob(['HISTORIAL DE ACTIVIDADES — OPTINET GPON\n\n' + lines.join('\n')], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `historial-gpon-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
}

function switchUsrTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

    const el = document.getElementById(`usr-tab-${t}`);

}

function filtrarTecsPorZonaCQ() {
  const zona = document.getElementById('cq-zona-search')?.value || document.getElementById('cq-zona')?.value || '';
  const liderSel = document.getElementById('cq-lider');
  const miembrosSel = document.getElementById('cq-miembros');
  if (!liderSel || !miembrosSel) return;
  const tecs = zona
    ? DB.users.filter(u => u.role === 'tecnico' && u.zona === zona)
    : DB.users.filter(u => u.role === 'tecnico');
  const opts = tecs.map(t => `<option value="${t.user}">${t.name} (${t.zona})</option>`).join('');
  liderSel.innerHTML = '<option value="">— Seleccionar líder —</option>' + opts;
  miembrosSel.innerHTML = opts;
}

          </select>
          <button class="btn btn-sm btn-green" onclick="agregarMiembroCQ('${id}')">+ Agregar</button>

  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>

function quitarMiembroCQ(cqId, userToRemove) {
  const cq = (DB.cuadrillas||[]).find(c => c.id === cqId);
  if (!cq) return;
  cq.miembros = (cq.miembros||[]).filter(m => m !== userToRemove);
  const u = DB.users.find(x => x.user === userToRemove);
  if (u && u.cuadrilla === cq.nombre) u.cuadrilla = '';
  saveDB();
  editarCuadrilla(cqId);
}

function agregarMiembroCQ(cqId) {
  const cq = (DB.cuadrillas||[]).find(c => c.id === cqId);
  if (!cq) return;
  const sel = document.getElementById('eq-add-miembro');
  const userToAdd = sel?.value;
  if (!userToAdd) { alert('Selecciona un técnico para agregar'); return; }
  if (!(cq.miembros||[]).includes(userToAdd)) {
    if (!cq.miembros) cq.miembros = [];
    cq.miembros.push(userToAdd);
    const u = DB.users.find(x => x.user === userToAdd);
    if (u) u.cuadrilla = cq.nombre;
    saveDB();
    editarCuadrilla(cqId);
  }
}

function guardarEdicionCuadrilla(id) {
  const cq = (DB.cuadrillas||[]).find(c => c.id === id);
  if (!cq) return;
  const nuevoNombre = document.getElementById('eq-nombre')?.value?.trim();
  const nuevaZona = document.getElementById('eq-zona-search')?.value || document.getElementById('eq-zona')?.value || '';
  const nuevoLider = document.getElementById('eq-lider')?.value;
  if (!nuevoNombre) { alert('El nombre de la cuadrilla es requerido'); return; }
  if (!nuevoLider) { alert('Debe seleccionar un líder'); return; }
  const nombreAnterior = cq.nombre;
  cq.nombre = nuevoNombre;
  cq.zona = nuevaZona;
  // Preservar zonas adicionales si existen, actualizar zona principal
  if (cq.zonas) {
    cq.zonas = [...new Set([nuevaZona, ...cq.zonas.filter(z => z !== cq.zona)])];
  } else {
    cq.zonas = [nuevaZona];
  }
  cq.lider = nuevoLider;
  DB.users.forEach(u => {
    if (u.cuadrilla === nombreAnterior) u.cuadrilla = nuevoNombre;
    if (u.user === nuevoLider) u.cuadrilla = nuevoNombre;
  });
  saveDB();
  closeModal();
  renderView('usuarios');
  alert(`Cuadrilla "${nuevoNombre}" actualizada exitosamente.`);
}

// Zonas extra temporales para el formulario de nueva cuadrilla
let _cqZonasExtra = [];

function agregarZonaCQ(zonaDirecta) {
  const zona = zonaDirecta || document.getElementById('cq-zona-extra-sel')?.value;
  if (!zona) return;
  if (!_cqZonasExtra.includes(zona)) _cqZonasExtra.push(zona);
  const search = document.getElementById('cq-zona-extra-search');
  if (search) search.value = '';
  renderChipsCQ();
}

function filtrarZonaCQOpciones(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('#cq-zona-extra-opciones .zona-cq-opt').forEach(el => {
    el.style.display = (!q || el.dataset.zona.includes(q)) ? '' : 'none';
  });
}

function quitarZonaCQ(zona) {
  _cqZonasExtra = _cqZonasExtra.filter(z => z !== zona);
  renderChipsCQ();
}

function renderChipsCQ() {
  const container = document.getElementById('cq-zonas-extra-chips');
  if (!container) return;
  container.innerHTML = _cqZonasExtra.map(z =>
    `<span style="background:#E3F2FD;color:#0277BD;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px">
      ${z}
      <button onclick="quitarZonaCQ('${z}')" style="background:none;border:none;cursor:pointer;color:#0277BD;font-size:15px;line-height:1;padding:0">×</button>
    </span>`
  ).join('');
}

function crearCuadrilla() {
  const nombre = document.getElementById('cq-nombre')?.value?.trim();
  const zonaPrincipal = document.getElementById('cq-zona-search')?.value || document.getElementById('cq-zona')?.value || '';
  const lider = document.getElementById('cq-lider')?.value;
  if (!nombre) { alert('El nombre de la cuadrilla es requerido'); return; }
  if (!lider) { alert('Debe seleccionar un líder'); return; }
  const miembrosEl = document.getElementById('cq-miembros');
  const miembros = miembrosEl ? [...miembrosEl.selectedOptions].map(o=>o.value) : [];
  if (!DB.cuadrillas) DB.cuadrillas = [];
  const id = 'CQ-' + Date.now();
  // Construir array de zonas (principal + extras, sin duplicados)
  const zonas = [...new Set([zonaPrincipal, ..._cqZonasExtra].filter(z => z))];
  DB.cuadrillas.push({ id, nombre, zona: zonaPrincipal, zonas, lider, miembros });
  DB.users.forEach(u => {
    if (u.user === lider || miembros.includes(u.user)) u.cuadrilla = nombre;

async function crearUsuario() {
  const user = document.getElementById('u-user').value.trim();
  const pass = document.getElementById('u-pass').value.trim();
  if (!user || !pass) { alert('Usuario y contraseña son requeridos'); return; }
  if (DB.users.find(u => u.user === user)) { alert('Ese usuario ya existe'); return; }
  const newRole = document.getElementById('u-role')?.value || 'tecnico';
  const nombre = document.getElementById('u-nombre').value || user;
  const zona = document.getElementById('u-zona-search')?.value || document.getElementById('u-zona')?.value || '';
  const cuadrilla = document.getElementById('u-cuadrilla').value || '';
  const email = user.includes('@') ? user : (user + '@optinet.ve');

  const newUser = { user, pass, role: newRole, name: nombre, zona, cuadrilla, email };

  // Registrar en Firebase Auth
  if (window._FB_READY) {
    try {
      const { auth, createUserWithEmailAndPassword, db, doc, setDoc } = window._FB;
      // Guardar el usuario autenticado actual para restaurarlo después
      const currentUser = auth.currentUser;
      // Crear usuario en Firebase Auth
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      newUser.uid = cred.user.uid;
      // Guardar perfil en Firestore
      await setDoc(doc(db, 'optinet_users', cred.user.uid), {
        user, email, role: newRole, name: nombre, zona, cuadrilla, uid: cred.user.uid
      });
      // Re-autenticar al usuario actual (admin) después de crear el nuevo usuario
      // Firebase Auth cierra la sesión del admin al crear un nuevo usuario
      if (currentUser) {
        const adminProfile = DB.users.find(u => u.uid === currentUser.uid || u.user === SESSION?.user);
        if (adminProfile) {
          const adminEmail = adminProfile.email || (adminProfile.user + '@optinet.ve');
          try {
            const { signInWithEmailAndPassword } = window._FB;
            await signInWithEmailAndPassword(auth, adminEmail, adminProfile.pass);
          } catch(reAuthErr) {
            console.warn('Re-auth admin error:', reAuthErr.message);
          }
        }
      }
      console.log('✅ Usuario registrado en Firebase Auth:', email);
    } catch(authErr) {
      if (authErr.code === 'auth/email-already-in-use') {
        console.warn('Email ya existe en Firebase Auth, continuando con registro local');
      } else {
        console.warn('Firebase Auth create user error:', authErr.code, authErr.message);
      }
    }
  }

  DB.users.push(newUser);
  saveDB();
  alert(`Usuario "${nombre}" creado exitosamente`);
  renderView('usuarios');
}

async function eliminarUsuario(user) {
  if (!confirm(`¿Eliminar el usuario "${user}"?`)) return;
  const userToDelete = DB.users.find(u => u.user === user);
  DB.users = DB.users.filter(u => u.user !== user);
  saveDB();
  // Eliminar perfil de Firestore (no podemos eliminar de Firebase Auth sin Admin SDK)
  if (window._FB_READY && userToDelete?.uid) {
    try {
      const { db, doc, deleteDoc } = window._FB;
      await deleteDoc(doc(db, 'optinet_users', userToDelete.uid));
    } catch(e) { console.warn('Error al eliminar perfil Firestore:', e); }
  }
  renderView('usuarios');
}

function cargarAverias(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      let added = 0;
      let nuevasCentrales = 0;
      const loteTimestamp = new Date().toISOString();
      const loteId = 'lote_' + Date.now();
      rows.forEach(row => {
        const id = String(row.id_averia || row['id_averia'] || '').trim();
        if (!id || DB.averias.find(a => a.id_averia === id)) return;
        const zona = (row['nombre central'] || row.zona || '').trim().toUpperCase();
        const estadoGeo = normalizarEstado(row['estado geografico'] || row.estado || '');
        if (zona && registrarCentralNueva(zona, estadoGeo)) nuevasCentrales++;
        const tp = (row.tipo_problema || '').trim().toUpperCase();
        const cat = FAULT_CATEGORIES[tp] || FAULT_CATEGORIES['NNV'];
        DB.averias.push({
          id_averia: id, area: row.area||'', zona, parroquia: row.parroquia||'',
          estatus: row.estatus||'PEND', tipo_problema: tp, descripcion: row.descripcion||'',
          tipo_servicio: row.tipo_servicio||'ABA ULTRA', servicio_off_on: row.servicio_off_on||'SIN_SERVICIO',
          dac: String(row.dac||''), 
          telefono: String(row.telefono||''), 
          contacto: String(row.contacto||''), 
          fecha_reporte: String(row.fecha_reporte||''),
          persona_reporta: row.persona_reporta||'',
          nombre: row.nombre||'', 
          direccion: row.direccion||'', 
          olt: row.olt||'', 
          ip: String(row.ip||''),
          tarjeta: row.tarjeta||'', plan: row.plan||'', slot: String(row.slot||''), puerto: String(row.puerto||''),
          ont_id: String(row.ont_id||''), fat: String(row.fat||''), serial: String(row.serial||''),
          cvlan: String(row.cvlan||''), ultimo_comentario: row.ultimo_comentario||'',
          problema_reporte: row.problema_reporte||'', dias_transcurridos: String(row['dias transcurrido desde la apertura']||''),
          area_resolutoria: row.area_resolutoria||'', severidad: cat.sev,
          estado_gestion: 'Abierta', asignado_a: '', ot_asignada: '',
          fecha_carga: loteTimestamp, lote_id: loteId
        });
        added++;
      });
      if (nuevasCentrales > 0) reordenarZonas();
      addHistorial('carga_datos', {tipo:'averias', count: added});
      saveDB();
      const msgCentrales = nuevasCentrales > 0 ? ` Se detectaron y agregaron ${nuevasCentrales} central(es) nueva(s) a la lista de zonas.` : '';
      document.getElementById('msg-av').innerHTML = `<div class="alert alert-ok">${iconCheck()} ${added} averías cargadas exitosamente. Los KPIs se actualizaron.${msgCentrales}</div>`;
    } catch(err) {
      document.getElementById('msg-av').innerHTML = `<div class="alert alert-err">Error al leer el archivo: ${err.message}</div>`;
    }
  };
  r.readAsBinaryString(f);
}

function cargarODN(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
      // Find header row
      let headerRow = -1;
      for (let i = 0; i < Math.min(10, rows.length); i++) {
        if (rows[i] && rows[i].some(c => String(c||'').includes('ACRÓNIMO') || String(c||'').includes('ACRONIMO'))) { headerRow = i; break; }
      }
      if (headerRow < 0) { document.getElementById('msg-odn').innerHTML = '<div class="alert alert-err">No se encontró la fila de encabezados. Verifique el formato del archivo.</div>'; return; }
      const headers = rows[headerRow].map(h => String(h||'').trim());
      const dataRows = rows.slice(headerRow + 1).filter(r => r && String(r[0]||'').match(/^\d+$/));
      const colMap = { N:0, ACRONIMO:1, IP:2, TARJETA:6, PUERTO_OLT:7, ID_FAT:30, SPLITTER_2:31, PUERTO_SPL2:32, DIRECCION:33, INMUEBLE:34, LATITUD:35, LONGITUD:36 };
      let added = 0;
      dataRows.forEach(row => {
        const rec = {};
        Object.entries(colMap).forEach(([k,i]) => { rec[k] = String(row[i]||'').trim(); });
        if (rec.ID_FAT && !DB.odn_extra.find(o => o.ID_FAT === rec.ID_FAT && o.PUERTO_SPL2 === rec.PUERTO_SPL2)) {
          DB.odn_extra.push(rec); added++;
        }
      });
      addHistorial('carga_datos', {tipo:'odn', count: added});
      saveDB();
      document.getElementById('msg-odn').innerHTML = `<div class="alert alert-ok">${iconCheck()} ${added} registros ODN cargados exitosamente.</div>`;
    } catch(err) {
      document.getElementById('msg-odn').innerHTML = `<div class="alert alert-err">Error al leer el archivo: ${err.message}</div>`;
    }
  };
  r.readAsBinaryString(f);
}

        </select>
        <input type="number" id="pl-atten" placeholder="Valor exacto en dB" step="0.01" style="margin-top:6px">
      </div>
    </div>`;
  }

  // Atenuación de empalmes
  if (esGrupo('medicion_empalmes')) {
    campos += `<div class="form-row">
      <div class="form-col">
        <label>Atenuación de Empalmes Medidos (dB)</label>
        <select id="pl-atten-sel" onchange="document.getElementById('pl-atten').value=this.value==='otro'?'':this.value">

          <option value="0.07">0.05 a 0.10 dB (bueno)</option>
          <option value="0.12">0.10 a 0.15 dB (aceptable — requiere seguimiento)</option>
          <option value="0.20">Más de 0.15 dB — REQUIERE REVISIÓN</option>
          <option value="otro">Otro valor (ingresar manualmente)</option>
        </select>
