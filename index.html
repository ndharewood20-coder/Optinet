        <input type="hidden" id="pl-potencia" value="">
      </div>
      <div class="form-col">
        <label>N° de Empalmes Inspeccionados</label>
        <input type="number" id="pl-empalmes-n" placeholder="Ej: 4" min="1">
      </div>
    </div>`;
  }

  // Condiciones ambientales
  if (esGrupo('condiciones_amb')) {
    campos += `<div class="form-row">
      <div class="form-col">
        <label>Temperatura de la Sala (°C)</label>
        <select id="pl-temp-sel" onchange="document.getElementById('pl-temp').value=this.value==='otro'?'':this.value">
          <option value="">— Seleccionar rango —</option>
          <option value="18">15°C a 20°C (fresco — normal)</option>
          <option value="23">20°C a 25°C (normal)</option>
          <option value="28">25°C a 30°C (cálido — aceptable)</option>
          <option value="32">Más de 30°C — ALERTA</option>
          <option value="12">Menos de 15°C — ALERTA</option>
          <option value="otro">Otro valor (ingresar manualmente)</option>
        </select>
        <input type="number" id="pl-temp" placeholder="Valor exacto en °C" step="0.5" style="margin-top:6px">
      </div>
      <div class="form-col">
        <label>Humedad Relativa (%)</label>
        <select id="pl-hum-sel" onchange="document.getElementById('pl-hum').value=this.value==='otro'?'':this.value">
          <option value="">— Seleccionar rango —</option>
          <option value="45">40% a 50% (normal)</option>
          <option value="57">50% a 65% (normal)</option>
          <option value="70">Más de 65% — ALERTA humedad alta</option>
          <option value="35">Menos de 40% — ALERTA humedad baja</option>
          <option value="otro">Otro valor (ingresar manualmente)</option>
        </select>
        <input type="number" id="pl-hum" placeholder="Valor exacto en %" step="1" style="margin-top:6px">
        <input type="hidden" id="pl-potencia" value="">
        <input type="hidden" id="pl-atten" value="">
      </div>
    </div>`;
  }

  // Voltaje DC
  if (esGrupo('voltaje_dc') && !esGrupo('condiciones_amb')) {
    campos += `<div class="form-row">
      <div class="form-col">

          <option value="-55">-52V a -57.6V (rango alto)</option>
          <option value="0">Fuera de rango — requiere atención</option>
          <option value="otro">Otro valor (ingresar manualmente)</option>
        </select>
        <input type="number" id="pl-voltaje" placeholder="Valor exacto en V" step="0.1" style="margin-top:6px">
        <input type="hidden" id="pl-potencia" value="">
        <input type="hidden" id="pl-atten" value="">
      </div>
    </div>`;
  }

  // Limpieza de conectores
  if (esGrupo('limpieza_conectores')) {
    campos += `<div class="form-row">
      <div class="form-col">
        <label>N° de Conectores Inspeccionados</label>
        <input type="number" id="pl-conect-total" placeholder="Ej: 12" min="1">
      </div>
      <div class="form-col">
        <label>N° de Conectores que Requirieron Limpieza</label>

        <label>N° de Conectores Reemplazados</label>

      </div>
      <input type="hidden" id="pl-potencia" value="">
      <input type="hidden" id="pl-atten" value="">
    </div>`;
  }

  // Actividades solo visuales / de sistema — sin campos de medición
  if (esGrupo('solo_visual') || esGrupo('revision_sistema')) {
    campos += `<input type="hidden" id="pl-potencia" value=""><input type="hidden" id="pl-atten" value="">`;
  }

  // Si ningún grupo coincide, mostrar campos básicos por defecto
  if (!campos) {
    campos = `<input type="hidden" id="pl-potencia" value=""><input type="hidden" id="pl-atten" value="">`;
  }

  return campos;
}

function toggleCheckItem(i) {
  const el = document.getElementById(`ci-${i}`);
  const chk = document.getElementById(`chk-${i}`);
  el.classList.toggle('checked', chk.checked);
  const total = document.querySelectorAll('[id^="chk-"]').length;
  const done  = document.querySelectorAll('[id^="chk-"]:checked').length;
  const pc = document.getElementById('prog-count');
  if (pc) pc.textContent = done;
}

function cerrarOTPreventiva(otId, totalItems) {
  const done = document.querySelectorAll('[id^="chk-"]:checked').length;
  if (done < Math.ceil(totalItems * 0.5)) {
    if (!confirm(`Solo has verificado ${done} de ${totalItems} ítems. ¿Deseas cerrar la orden de todas formas?`)) return;
  }
  const o = DB.ordenes.find(x => x.id === otId);
  const planilla = {
    // Campos MP-D-001
    n_ot: otId,
    tipo: 'Preventivo',
    items_total: totalItems,
    items_ok: done,
    // Mediciones
    potencia: document.getElementById('pl-potencia')?.value || '',
    atten: document.getElementById('pl-atten')?.value || '',
    temp: document.getElementById('pl-temp')?.value || '',
    hum: document.getElementById('pl-hum')?.value || '',
    voltaje: document.getElementById('pl-voltaje')?.value || '',
    empalmes_n: document.getElementById('pl-empalmes-n')?.value || '',
    conect_total: document.getElementById('pl-conect-total')?.value || '',
    conect_limpiados: document.getElementById('pl-conect-limpiados')?.value || '',
    conect_reemplazados: document.getElementById('pl-conect-reemplazados')?.value || '',
    // Recursos
    materiales: document.getElementById('pl-materiales')?.value || '',
    // Resultado
    estado: document.getElementById('pl-estado')?.value || '',
    obs: document.getElementById('pl-obs')?.value || '',
    // Control
    hora_inicio: document.getElementById('pl-hora-inicio')?.value || '',
    hora_fin: document.getElementById('pl-hora-fin')?.value || '',
    firma_tec: document.getElementById('pl-firma-prev')?.value || SESSION.name,
    firma_sup: document.getElementById('pl-firma-sup-prev')?.value || ''
  };
  o.estado = 'Completada';
  o.fecha_cierre = new Date().toISOString().slice(0,16).replace('T',' ');
  o.atten = planilla.atten;
  o.resultado = `${planilla.estado} — ${planilla.obs || 'Sin novedad'}`;
  o.planilla_data = planilla;
  addHistorial('ot_completada', { ot: otId, tipo: 'Preventivo', resultado: planilla.estado });
  saveDB();
  closeModal();
  alert(`Orden ${otId} cerrada exitosamente.`);
  renderView('mis-ordenes');
}

function cerrarOTCorrectiva(otId) {
  const causa = document.getElementById('pl-causa')?.value;
  const accion = document.getElementById('pl-accion')?.value;
  if (!causa || !accion) { alert('Por favor complete la causa raíz y la acción correctiva.'); return; }
  const o = DB.ordenes.find(x => x.id === otId);
  const attDespues = document.getElementById('pl-att-despues')?.value || '';
  const horaLlegada = document.getElementById('pl-llegada')?.value || '';
  const planilla = {
    // Campos OT-GPON-001
    n_ot: otId,
    tipo: 'Correctivo',
    reportado_por: document.getElementById('pl-reportado')?.value || 'Abonado',
    n_ticket: document.getElementById('pl-ticket')?.value || '',
    n_abonados: document.getElementById('pl-abonados')?.value || '1',
    hora_apertura: new Date().toISOString().slice(0,16).replace('T',' '),
    hora_llegada: horaLlegada,
    // Diagnóstico
    causa: causa,
    elemento: document.getElementById('pl-elemento')?.value || '',
    accion: accion,
    materiales: document.getElementById('pl-mat')?.value || '',
    // Mediciones
    att_antes: document.getElementById('pl-att-antes')?.value || '',
    att_despues: attDespues,
    potencia_rx: document.getElementById('pl-potencia-rx')?.value || '',
    // Cierre
    servicio: document.getElementById('pl-servicio')?.value || '',
    notif: document.getElementById('pl-notif')?.value || '',
    mttr_est: document.getElementById('pl-mttr-est')?.value || '',
    firma_tec: document.getElementById('pl-firma-tec')?.value || SESSION.name,
    firma_sup: document.getElementById('pl-firma-sup')?.value || '',
    obs: document.getElementById('pl-obs-c')?.value || ''
  };
  o.estado = 'Completada';
  o.fecha_cierre = new Date().toISOString().slice(0,16).replace('T',' ');
  o.atten = attDespues;
  o.resultado = `${accion} — ${planilla.servicio === 'Si' ? 'Servicio restablecido' : 'Pendiente'}`;
  o.planilla_data = planilla;
  // Close averia
  if (o.averia_id) {
    const av = DB.averias.find(a => a.id_averia === o.averia_id);
    if (av) {
      av.estado_gestion = 'Cerrada';
      av.causa_raiz = causa;
      av.accion_correctiva = accion;
      av.fecha_cierre = o.fecha_cierre;
      addHistorial('averia_cerrada', { id: av.id_averia, causa, zona: av.zona });
    }
  }
  // Add to historial for KPI
  addHistorial('ot_completada', { ot: otId, tipo: 'Correctivo', causa, att: attDespues });
  saveDB();
  closeModal();
  alert(`Orden ${otId} cerrada. Datos guardados para el cálculo de KPIs.`);
  renderView('mis-ordenes');
}

function renderPlanillaResumen(pd) {
  if (!pd || !Object.keys(pd).length) return '';
  return `<div style="margin-top:12px;padding:12px;background:#F8FAFF;border-radius:8px;border:1px solid var(--border)">
    <div style="font-size:12px;font-weight:700;color:var(--blue-dark);margin-bottom:8px">Datos de Planilla</div>
    <div class="odn-detail-grid">
      ${pd.causa ? `<div class="odn-detail-item"><label>Causa Raíz</label><span>${pd.causa}</span></div>` : ''}
      ${pd.accion ? `<div class="odn-detail-item"><label>Acción</label><span>${pd.accion}</span></div>` : ''}
      ${pd.att_despues ? `<div class="odn-detail-item"><label>Atenuación Final</label><span>${pd.att_despues} dB</span></div>` : ''}
      ${pd.potencia ? `<div class="odn-detail-item"><label>Potencia</label><span>${pd.potencia} dBm</span></div>` : ''}
      ${pd.estado ? `<div class="odn-detail-item"><label>Estado</label><span>${pd.estado}</span></div>` : ''}
      ${pd.items_ok !== undefined ? `<div class="odn-detail-item"><label>Ítems OK</label><span>${pd.items_ok}/${pd.items_total}</span></div>` : ''}
    </div>
    ${pd.obs ? `<div style="font-size:12px;color:var(--txt-muted);margin-top:6px;font-style:italic">${pd.obs}</div>` : ''}
  </div>`;
}

function getFilteredODN() {
  const allData = [...ODN_DATA_RAW, ...DB.odn_extra];
  const fatFilt = document.getElementById('odn-filt-fat')?.value || '';
  const dirFilt = document.getElementById('odn-filt-dir')?.value || '';
  const search  = (document.getElementById('odn-search')?.value || '').toLowerCase();
  return allData.filter(r => {
    if (fatFilt && r.ID_FAT !== fatFilt) return false;
    if (dirFilt && r.DIRECCION !== dirFilt) return false;
    if (search) {
      const hay = [r.INMUEBLE, r.ID_FAT, r.ACRONIMO, r.DIRECCION, r.SPLITTER_2, r.IP].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function renderODNTree() {
  const allData = [...ODN_DATA_RAW, ...DB.odn_extra];
  const container = document.getElementById('odn-tree-container');
  if (!container) return;

  // Build tree: OLT > Feeder > FAT > Abonado
  const tree = {};
  allData.forEach(r => {
    const olt = r.ACRONIMO || 'OLT';
    const feeder = r.ID_CABLE_FEEDER || 'Feeder';
    const fat = r.ID_FAT || 'FAT';
    if (!tree[olt]) tree[olt] = {};
    if (!tree[olt][feeder]) tree[olt][feeder] = {};
    if (!tree[olt][feeder][fat]) tree[olt][feeder][fat] = [];
    tree[olt][feeder][fat].push(r);
  });

  let html = '';
  Object.entries(tree).forEach(([olt, feeders]) => {
    html += `<div class="odn-node odn-node-olt" onclick="toggleNode('olt-${olt}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      &nbsp;OLT: ${olt}
    </div>
    <div id="olt-${olt}" class="odn-children">`;
    Object.entries(feeders).forEach(([feeder, fats]) => {
      const fid = 'f-' + feeder.replace(/[^a-z0-9]/gi,'_');
      html += `<div class="odn-node" style="font-size:12px" onclick="toggleNode('${fid}')">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        &nbsp;${feeder.length > 30 ? feeder.slice(0,28)+'...' : feeder}
      </div>
      <div id="${fid}" class="odn-children">`;
      Object.entries(fats).forEach(([fat, subs]) => {
        const fatId = 'fat-' + fat.replace(/[^a-z0-9]/gi,'_');
        html += `<div class="odn-node odn-node-fat" style="font-size:12px" onclick="toggleNode('${fatId}')">

          &nbsp;${fat}

        <div id="${fatId}" class="odn-children hidden">`;
        subs.forEach(r => {
          const libre = !r.INMUEBLE || r.INMUEBLE.toLowerCase().includes('libre');
          html += `<div class="odn-node odn-node-sub" style="font-size:11px;cursor:pointer" onclick="selectODNSub(${JSON.stringify(r).replace(/"/g,'&quot;')}, this)">
            <span style="color:${libre?'var(--green-lt)':'var(--txt)'}">
              Pto.${r.PUERTO_SPL2} — ${libre ? '(libre)' : r.INMUEBLE}

          </div>`;
        });
        html += '</div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

/* ── AUTO-ASIGNACIÓN DE AVERÍAS A CUADRILLAS ──────────────────────────────── */
function autoAsignarAverias() {
  const zonasActivas = SESSION.role === 'gerente_zona' ? getZonasActivas() : null;

  // Averías abiertas sin asignar (filtradas por zonas del gerente si aplica)
  const averiasDisp = DB.averias.filter(a =>
    a.estado_gestion === 'Abierta' && !a.asignado_a &&
    (!zonasActivas || zonasActivas.includes(a.zona))
  );
  if (!averiasDisp.length) { alert('No hay averías abiertas sin asignar en tus zonas.'); return; }

  // Cuadrillas disponibles en las zonas del gerente
  const cuadrillasDisp = (DB.cuadrillas || []).filter(cq =>
    !zonasActivas || (cq.zonas || [cq.zona]).some(z => zonasActivas.includes(z))
  );
  if (!cuadrillasDisp.length) { alert('No hay cuadrillas activas en tus zonas. Crea cuadrillas primero.'); return; }

  // Mapa zona → cuadrilla(s)
  const mapZonaCQ = {};
  cuadrillasDisp.forEach(cq => {
    (cq.zonas || [cq.zona]).forEach(z => {
      if (!mapZonaCQ[z]) mapZonaCQ[z] = [];
      mapZonaCQ[z].push(cq);
    });
  });

  // Balanceo de carga: contar averías activas por cuadrilla
  const cargaCQ = {};
  cuadrillasDisp.forEach(cq => { cargaCQ[cq.id] = 0; });
  DB.averias.filter(a => a.estado_gestion === 'Abierta' && a.asignado_a).forEach(a => {
    const cq = cuadrillasDisp.find(c => c.lider === a.asignado_a || (c.miembros||[]).includes(a.asignado_a));
    if (cq) cargaCQ[cq.id] = (cargaCQ[cq.id] || 0) + 1;
  });

  // Asignar cada avería a la cuadrilla con menos carga en su zona
  let asignadas = 0;
  const detalles = [];
  averiasDisp.forEach(av => {
    const cqsZona = mapZonaCQ[av.zona] || [];
    if (!cqsZona.length) return;
    // Elegir la cuadrilla con menos carga
    const cqElegida = cqsZona.reduce((min, cq) => (cargaCQ[cq.id]||0) < (cargaCQ[min.id]||0) ? cq : min);
    av.asignado_a = cqElegida.lider;
    cargaCQ[cqElegida.id] = (cargaCQ[cqElegida.id] || 0) + 1;
    asignadas++;
    detalles.push({ averia: av.id_averia, zona: av.zona, cuadrilla: cqElegida.nombre });
  });

  if (!asignadas) {
    alert('No se pudo asignar ninguna avería. Verifica que las cuadrillas tienen zonas configuradas que coincidan con las averías.');
    return;
  }

  addHistorial('auto_asignacion', { count: asignadas, por: SESSION.user });
  saveDB();

  const sinCQ = averiasDisp.length - asignadas;
  const resumen = detalles.slice(0, 5).map(d => `• ${d.averia} (${d.zona}) → ${d.cuadrilla}`).join('\n');
  const extra = detalles.length > 5 ? `\n... y ${detalles.length - 5} más` : '';
  alert(`✅ Auto-asignación completada:
${asignadas} averías asignadas${sinCQ > 0 ? '\n⚠️ ' + sinCQ + ' sin cuadrilla para su zona' : ''}

Detalle (primeras 5):
${resumen}${extra}`);
  renderView('averias-admin');
}

function switchAvTab(btn, tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['abiertas','asignadas','cerradas'].forEach(t => {
    const el = document.getElementById(`av-tab-${t}`);
    if (el) el.classList.toggle('hidden', t !== tab);
  });
}

function filtrarZonasList(id, query) {
  const list = document.getElementById(id + '-list');
  if (!list) return;
  const q = query.toLowerCase().trim();
  list.querySelectorAll('.zona-opt').forEach(el => {
    const text = el.textContent.toLowerCase();
    el.style.display = (!q || text.includes(q)) ? '' : 'none';
  });
  list.style.display = 'block';
}

// Filtro genérico para listas de búsqueda con clase .lista-opt (Estado / Central en Crear Usuario)
function filtrarListaGenerica(listId, query) {
  const list = document.getElementById(listId);
  if (!list) return;
  const q = query.toLowerCase().trim();
  list.querySelectorAll('.lista-opt').forEach(el => {
    el.style.display = (!q || (el.dataset.txt || '').includes(q)) ? '' : 'none';
  });
  list.style.display = 'block';
}

function seleccionarEstadoUsuario(estado) {
  const input = document.getElementById('u-estado-search');
  if (input) input.value = estado;
  document.getElementById('u-estado-list').style.display = 'none';

  const centrales = ESTADO_CENTRALES[estado] || [];
  const central = document.getElementById('u-zona-search');
  if (central) { central.value = ''; central.placeholder = 'Buscar central...'; }
  const list = document.getElementById('u-zona-list');
  if (list) {
    list.innerHTML = centrales.length
      ? centrales.map(z=>`<div class="lista-opt" data-txt="${z.toLowerCase()}" onclick="seleccionarCentralUsuario('${z}')" style="padding:7px 12px;cursor:pointer;font-size:13px">${z}</div>`).join('')
      : '<div style="padding:8px 12px;font-size:12px;color:var(--muted)">Sin centrales registradas en este estado todavía</div>';
  }
}

function seleccionarCentralUsuario(central) {
  const input = document.getElementById('u-zona-search');
  if (input) input.value = central;
  const list = document.getElementById('u-zona-list');
  if (list) list.style.display = 'none';
}

function seleccionarZonaField(id, zona, onChangeFn, allLabel) {
  const input = document.getElementById(id + '-search');
  if (input) input.value = zona || '';
  const list = document.getElementById(id + '-list');
  if (list) {
    list.style.display = 'none';
    // Update highlight
    list.querySelectorAll('.zona-opt').forEach(el => {
      const isSelected = el.textContent.trim() === (zona || (allLabel || 'Todas las zonas'));
      el.style.background = isSelected ? 'var(--blue)' : '';
      el.style.color = isSelected ? '#fff' : '';
    });
  }
  // Execute callback if provided
  if (onChangeFn) {
    try { eval(onChangeFn + '()'); } catch(e) { console.warn('zonaField callback error:', e); }
  }
}

function getZonaFieldValue(id) {
  const input = document.getElementById(id + '-search');
  return input ? input.value.trim() : '';
}

  const q = query.toLowerCase().trim();
  list.querySelectorAll('.zona-opt').forEach(el => {

  });

}

function seleccionarZona(zona) {
  const input = document.getElementById('av-zona-search');
  if (input) input.value = zona || '';
  const list = document.getElementById('av-zona-list');
  if (list) list.style.display = 'none';
  // Trigger filter
  const fakeEl = { value: zona };
  document.getElementById('av-filt-zona-hidden') && (document.getElementById('av-filt-zona-hidden').value = zona);
  renderAveriasContent_withZona(zona);
}

function renderAveriasContent_withZona(zonaOverride) {
  // Store the selected zona for renderAveriasContent to use
  window._zonaOverride = zonaOverride !== undefined ? zonaOverride : null;
  renderAveriasContent();
  window._zonaOverride = null;
}

function renderAveriasContent() {
  const zona  = window._zonaOverride !== undefined && window._zonaOverride !== null
    ? window._zonaOverride
    : (document.getElementById('av-zona-search')?.value?.trim() || '');
  const sev   = document.getElementById('av-filt-sev')?.value || '';
  const tipo  = document.getElementById('av-filt-tipo')?.value || '';
  const search= (document.getElementById('av-search')?.value || '').toLowerCase();

  ['abiertas','asignadas','cerradas'].forEach(estado => {
    const isAbierta = estado === 'abiertas';
    const isAsignada = estado === 'asignadas';
    const zonasRend = SESSION.role === 'gerente_zona' ? getZonasActivas() : null;
    const zonaFiltroRend = zonasRend && zonasRend.length === 1 ? zonasRend[0] : null;
    const avBase = zonasRend ? DB.averias.filter(a => zonasRend.includes(a.zona)) : DB.averias;
    let items;
    if (isAbierta) items = avBase.filter(a => a.estado_gestion === 'Abierta' && !a.asignado_a);
    else if (isAsignada) items = avBase.filter(a => a.estado_gestion === 'Abierta' && a.asignado_a);
    else items = avBase.filter(a => a.estado_gestion === 'Cerrada');
    if (zona) items = items.filter(a => a.zona === zona);
    if (sev)  items = items.filter(a => String(a.severidad) === sev);
    if (tipo) items = items.filter(a => a.tipo_problema === tipo);
    if (search) items = items.filter(a => [a.id_averia,a.nombre,a.fat,a.descripcion,a.direccion].join(' ').toLowerCase().includes(search));
    // Sort by severity then date
    items.sort((a,b) => (a.severidad||5) - (b.severidad||5));
    const el = document.getElementById(`av-content-${estado}`);
    if (!el) return;
    if (!items.length) { el.innerHTML = '<div class="card"><p style="color:var(--muted)">No hay averías en esta categoría con los filtros aplicados.</p></div>'; return; }
    // Agrupar por lote para separación visual entre cargas
    const lotes = {};
    items.forEach(a => {
      const k = a.lote_id || 'sin_lote';
      if (!lotes[k]) lotes[k] = { fecha: a.fecha_carga || null, items: [] };
      lotes[k].items.push(a);
    });
    const loteKeys = Object.keys(lotes);
    let html = '';
    if (loteKeys.length > 1) {
      loteKeys.sort((a, b) => (lotes[b].fecha||'0').localeCompare(lotes[a].fecha||'0'));
      loteKeys.forEach((key, idx) => {
        const lote = lotes[key];
        const fechaStr = lote.fecha
          ? new Date(lote.fecha).toLocaleString('es-VE', {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})
          : 'Carga anterior';
        const esNuevo = idx === 0;
        html += `<div style="margin:${idx===0?'0':'16px'} 0 8px 0;display:flex;align-items:center;gap:10px">
          <div style="flex:1;height:2px;background:${esNuevo?'var(--blue)':'var(--border)'}"></div>
          <span style="font-size:11px;font-weight:700;color:${esNuevo?'var(--blue)':'var(--muted)'};white-space:nowrap;padding:3px 10px;border-radius:20px;background:${esNuevo?'#E8F0FE':'var(--bg)'}">
            ${esNuevo?'🆕 ':''}Carga: ${fechaStr} · ${lote.items.length} averías
          </span>
          <div style="flex:1;height:2px;background:${esNuevo?'var(--blue)':'var(--border)'}"></div>
        </div>`;
        html += lote.items.map(a => renderAveriaCard(a, SESSION.role !== 'tecnico')).join('');
      });
    } else {
      html = items.map(a => renderAveriaCard(a, SESSION.role !== 'tecnico')).join('');
    }
    el.innerHTML = html;
  });
}

function renderAveriaCard(a, isAdmin) {

  const tec = a.asignado_a ? DB.users.find(u => u.user === a.asignado_a) : null;
  const isOpen = a.estado_gestion === 'Abierta';
  return `<div class="averia-card sev-${a.severidad}" id="av-card-${a.id_averia}" onclick="verAveria('${a.id_averia}')">
    <div class="averia-header">
      <div style="display:flex;align-items:flex-start;gap:10px;flex:1">
        ${isAdmin && isOpen ? `<input type="checkbox" class="av-chk" data-id="${a.id_averia}"
          style="width:17px;height:17px;margin-top:3px;flex-shrink:0;cursor:pointer"
          onclick="event.stopPropagation();toggleAvSelection('${a.id_averia}',this)">` : ''}
        <div style="flex:1">
          <div class="averia-id">ID: ${a.id_averia} · ${a.fecha_reporte}</div>
          <div class="averia-title">${a.nombre}</div>
          <div class="averia-meta">
            <span class="pill ${sev.pill}">${sev.label}</span>
            &nbsp;<span style="background:${cat.color}20;color:${cat.color};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${cat.label}</span>
            &nbsp;Zona: <strong>${a.zona}</strong> · ${a.tipo_servicio}
            ${a.dias_transcurridos ? ` · <span style="color:${parseInt(a.dias_transcurridos)>30?'var(--red)':'var(--txt-muted)'}"><strong>${a.dias_transcurridos}</strong> días</span>` : ''}
          </div>
          <div class="averia-meta" style="margin-top:3px">
            <strong>Tel:</strong> ${a.telefono||'—'} ${a.contacto?'· <strong>Contacto:</strong> '+a.contacto:''} ${a.persona_reporta?'· Reporta: '+a.persona_reporta:''}
          </div>
          <div class="averia-meta" style="margin-top:2px">
            OLT: ${a.olt||'—'} · Puerto: ${a.puerto||'—'} · FAT: ${a.fat||'—'} · Plan: ${a.plan||'—'}
          </div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;color:var(--txt-muted)">${a.servicio_off_on === 'SIN_SERVICIO' ? '<span style="color:var(--red);font-weight:700">SIN SERVICIO</span>' : '<span style="color:var(--green);font-weight:700">CON SERVICIO</span>'}</div>
        ${ot ? `<div style="font-size:11px;margin-top:4px;color:var(--blue)">OT: ${ot.id}</div>` : ''}
        ${tec ? `<div style="font-size:11px;color:var(--txt-muted)">Asignado: ${tec.name}</div>` : ''}
        ${isAdmin && isOpen && !ot ? `<button class="btn btn-sm btn-orange" style="margin-top:6px" onclick="event.stopPropagation();crearOTDesdeAveria('${a.id_averia}')">Crear OT</button>` : ''}
      </div>
    </div>
    ${a.ultimo_comentario ? `<div class="averia-comment">${a.ultimo_comentario.slice(0,200)}${a.ultimo_comentario.length>200?'...':''}</div>` : ''}
  </div>`;
}

function verAveria(id) {
  const a = DB.averias.find(x => x.id_averia === id);
  if (!a) return;
  const sev = SEV_LABELS[a.severidad] || SEV_LABELS[5];
  const cat = FAULT_CATEGORIES[a.tipo_problema] || { label: a.tipo_problema || 'Sin clasificar' };
  const ot = a.ot_asignada ? DB.ordenes.find(o => o.id === a.ot_asignada) : null;
  const tec = a.asignado_a ? DB.users.find(u => u.user === a.asignado_a) : null;
  showModal(`Avería ${a.id_averia}`, `
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <span class="pill ${sev.pill}">${sev.label}</span>
      <span style="background:#E3F2FD;color:#0277BD;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${cat.label}</span>
      <span class="pill ${a.estado_gestion==='Abierta'?'pill-pend':'pill-done'}">${a.estado_gestion}</span>
      <span class="pill ${a.servicio_off_on==='SIN_SERVICIO'?'pill-crit':'pill-done'}">${a.servicio_off_on}</span>
    </div>

/* ============================================================
   SELECCIÓN MÚLTIPLE Y ASIGNACIÓN MASIVA DE AVERÍAS
   ============================================================ */
let _avSeleccionadas = new Set();

function toggleAvSelection(id, chk) {
  if (chk.checked) {
    _avSeleccionadas.add(id);
    document.getElementById('av-card-' + id)?.classList.add('av-selected');
  } else {
    _avSeleccionadas.delete(id);
    document.getElementById('av-card-' + id)?.classList.remove('av-selected');
  }
  actualizarBarraMasiva();
}

function toggleSeleccionarTodas(chk) {
  const checkboxes = document.querySelectorAll('.av-chk');
  checkboxes.forEach(cb => {
    cb.checked = chk.checked;
    const id = cb.dataset.id;
    if (chk.checked) {
      _avSeleccionadas.add(id);
      document.getElementById('av-card-' + id)?.classList.add('av-selected');
    } else {
      _avSeleccionadas.delete(id);
      document.getElementById('av-card-' + id)?.classList.remove('av-selected');
    }
  });
  actualizarBarraMasiva();
}

function deseleccionarTodas() {
  _avSeleccionadas.clear();
  document.querySelectorAll('.av-chk').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('.av-selected').forEach(el => el.classList.remove('av-selected'));
  const chkAll = document.getElementById('chk-select-all');
  if (chkAll) chkAll.checked = false;
  actualizarBarraMasiva();
}

function actualizarBarraMasiva() {
  const bar = document.getElementById('bulk-action-bar');
  const lbl = document.getElementById('bulk-count-label');
  if (!bar) return;
  const n = _avSeleccionadas.size;
  if (n > 0) {
    bar.classList.remove('hidden');
    bar.style.display = 'flex';
    lbl.textContent = n + (n === 1 ? ' avería seleccionada' : ' averías seleccionadas');
  } else {
    bar.classList.add('hidden');
    bar.style.display = 'none';
  }
  // Sync "select all" checkbox state
  const total = document.querySelectorAll('.av-chk').length;
  const chkAll = document.getElementById('chk-select-all');
  if (chkAll) {
    chkAll.checked = total > 0 && n === total;
    chkAll.indeterminate = n > 0 && n < total;
  }
}

function asignarMasivo() {
  if (_avSeleccionadas.size === 0) { alert('Selecciona al menos una avería.'); return; }
  const selVal = document.getElementById('bulk-tec-select')?.value;
  if (!selVal) { alert('Selecciona un técnico o cuadrilla para asignar.'); return; }
  let tecUser = selVal;
  let cuadrillaId = null;
  let assignLabel = '';
  if (selVal.startsWith('cq:')) {
    cuadrillaId = selVal.replace('cq:', '');
    const cq = (DB.cuadrillas||[]).find(c => c.id === cuadrillaId);
    if (!cq) { alert('Cuadrilla no encontrada.'); return; }
    tecUser = cq.lider; // Assign to leader
    assignLabel = `Cuadrilla: ${cq.nombre} (Líder: ${DB.users.find(u=>u.user===cq.lider)?.name||cq.lider})`;
  } else {
    const tec = DB.users.find(u => u.user === tecUser);
    if (!tec) { alert('Técnico no encontrado.'); return; }
    assignLabel = tec.name;
  }
  let asignadas = 0;
  _avSeleccionadas.forEach(id => {
    const av = DB.averias.find(a => a.id_averia === id);
    if (av && av.estado_gestion === 'Abierta') {
      av.asignado_a = tecUser;
      if (cuadrillaId) av.cuadrilla_id = cuadrillaId;
      addHistorial('averia_asignada', { id, tecnico: tecUser, zona: av.zona });
      asignadas++;
    }
  });
  saveDB();
  deseleccionarTodas();
  alert(`${asignadas} avería(s) asignadas a ${tec.name} exitosamente.`);
  renderView('averias-admin');
}

function crearOTsMasivo() {
  if (_avSeleccionadas.size === 0) { alert('Selecciona al menos una avería.'); return; }
  const ids = [..._avSeleccionadas];
  let creadas = 0, omitidas = 0;
  ids.forEach(id => {
    const av = DB.averias.find(a => a.id_averia === id);
    if (!av || av.estado_gestion !== 'Abierta') { omitidas++; return; }
    if (av.ot_asignada) { omitidas++; return; } // ya tiene OT
    // Buscar técnico asignado o el primero de la zona
    const tecUser = av.asignado_a ||
      (DB.users.find(u => u.role === 'tecnico' && u.zona === av.zona) || DB.users.find(u => u.role === 'tecnico'))?.user;
    if (!tecUser) { omitidas++; return; }
    const cat = FAULT_CATEGORIES[av.tipo_problema] || {};
    const proc = cat.proc || 'MC-04';
    const maxId = DB.ordenes.reduce((mx, o) => Math.max(mx, parseInt(o.id.replace('OT-','')) || 0), 0);
    const newId = 'OT-' + String(maxId + 1 + creadas).padStart(3,'0');
    DB.ordenes.push({
      id: newId, tipo: 'Correctivo', actividad: proc, zona: av.zona,
      tecnico: tecUser, fat: av.fat || '-', estado: 'Pendiente', programada: false,
      fecha: new Date().toISOString().slice(0,10),
      detalle: `Avería ${av.id_averia} — ${av.descripcion} — ${av.nombre}`,
      atten: '', resultado: '', planilla_data: {}, fecha_inicio: '', fecha_cierre: '',
      averia_id: av.id_averia
    });
    av.ot_asignada = newId;
    if (!av.asignado_a) av.asignado_a = tecUser;
    addHistorial('ot_creada', { ot: newId, tipo: 'Correctivo', zona: av.zona, tecnico: tecUser, averia: id });
    creadas++;
  });
  saveDB();
  deseleccionarTodas();
  alert(`${creadas} OT(s) correctiva(s) creadas.${omitidas > 0 ? ' ' + omitidas + ' omitidas (ya tenían OT o sin técnico disponible).' : ''}`);
  renderView('averias-admin');
}

function crearOTDesdeAveria(avId) {
  const av = DB.averias.find(a => a.id_averia === avId);
  if (!av) return;
  // Find best technician for zone
  const tecs = DB.users.filter(u => u.role === 'tecnico' && u.zona === av.zona);
  const tec = tecs[0] || DB.users.find(u => u.role === 'tecnico');
  if (!tec) { alert('No hay técnicos disponibles para esta zona.'); return; }
  const cat = FAULT_CATEGORIES[av.tipo_problema] || FAULT_CATEGORIES['NNV'];
  // Generate sequential OT ID based on max existing ID
  const maxId = DB.ordenes.reduce((max, o) => {
    const num = parseInt(o.id.replace('OT-','')) || 0;
    return Math.max(max, num);
  }, 0);
  const id = 'OT-' + String(maxId + 1).padStart(3,'0');
  DB.ordenes.push({
    id, tipo: 'Correctivo', actividad: cat.proc || 'MC-04', zona: av.zona,
    tecnico: tec.user, fat: av.fat || '-', estado: 'Pendiente', programada: false,
    fecha: new Date().toISOString().slice(0,10),
    detalle: `Avería ${av.id_averia} — ${av.nombre} — ${av.problema_reporte || av.descripcion}`,
    atten: '', resultado: '', planilla_data: {}, fecha_inicio: '', fecha_cierre: '', averia_id: av.id_averia
  });
  av.ot_asignada = id;
  av.asignado_a = tec.user;
  addHistorial('ot_creada', { ot: id, tipo: 'Correctivo', zona: av.zona, tecnico: tec.user, averia: avId });
  saveDB();
  alert(`OT ${id} creada y asignada a ${tec.name}`);
  renderView('averias-admin');
}

function cerrarAveriaDirecta(avId) {
  const av = DB.averias.find(a => a.id_averia === avId);
  if (!av) return;
  if (!confirm(`¿Marcar la avería ${avId} como resuelta?`)) return;
  av.estado_gestion = 'Cerrada';
  av.fecha_cierre = new Date().toISOString().slice(0,16).replace('T',' ');
  addHistorial('averia_cerrada', { id: avId, zona: av.zona });
  saveDB();
  closeModal();
  renderView('averias-admin');
}

  return `<div class="averia-card sev-${a.severidad}">

        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;color:var(--muted)">Resp: <strong>${sev.resp}</strong></div>
        <div style="font-size:11px;color:var(--muted)">Resol: <strong>${sev.resol}</strong></div>
        <div style="font-size:11px;color:${a.servicio_off_on==='SIN_SERVICIO'?'var(--red)':'var(--green)'};font-weight:700;margin-top:4px">${a.servicio_off_on||''}</div>
      </div>
    </div>
    ${a.ultimo_comentario ? `<div class="av-comment">${a.ultimo_comentario.slice(0,180)}${a.ultimo_comentario.length>180?'...':''}</div>` : ''}
    <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-outline btn-sm" onclick="verAveriaDetalleTec('${a.id_averia}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Ver Detalles Completos
      </button>
      ${puedeResolver ? `<button class="btn btn-green btn-sm" onclick="abrirPlanillaTecnico('${a.id_averia}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Iniciar / Cerrar Avería
      </button>` : (cq && !puedeResolver ? `<span style="font-size:11px;color:var(--muted);padding:5px">Solo el líder puede cerrar</span>` : '')}
      ${isClosed ? `<span class="pill pill-done">Resuelta · ${a.fecha_cierre||''}</span>` : ''}
    </div>
    ${isClosed && a.causa_raiz ? `<div style="margin-top:8px;font-size:12px;color:var(--green)"><strong>Causa:</strong> ${a.causa_raiz} · <strong>Acción:</strong> ${a.accion_correctiva||'—'}</div>` : ''}
  </div>`;
}

function verAveriaDetalleTec(id) {
  const a = DB.averias.find(x => x.id_averia === id);
  if (!a) return;
  const sev = SEV_LABELS[a.severidad] || SEV_LABELS[5];
  const cat = FAULT_CATEGORIES[a.tipo_problema] || { label: a.tipo_problema || 'Sin clasificar' };
  showModal(`Avería ${a.id_averia} — Detalles Completos`, `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      <span class="pill ${sev.pill}">${sev.label}</span>
      <span style="background:#E3F2FD;color:#0277BD;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:700">${cat.label}</span>
      <span class="pill ${a.estado_gestion==='Abierta'?'pill-pend':'pill-done'}">${a.estado_gestion}</span>
      <span class="pill ${a.servicio_off_on==='SIN_SERVICIO'?'pill-crit':'pill-done'}">${a.servicio_off_on}</span>
    </div>
    <div class="odn-detail-grid">
      <div class="odn-detail-item"><label>ID Avería</label><span>${a.id_averia}</span></div>
      <div class="odn-detail-item"><label>Fecha Reporte</label><span>${a.fecha_reporte}</span></div>
      <div class="odn-detail-item"><label>Zona / Parroquia</label><span>${a.zona} / ${a.parroquia||'—'}</span></div>
      <div class="odn-detail-item"><label>Nombre Cliente</label><span>${a.nombre}</span></div>
      <div class="odn-detail-item"><label>Teléfono</label><span>${a.telefono||'—'}</span></div>
      <div class="odn-detail-item"><label>Contacto</label><span>${a.contacto||'—'}</span></div>
      <div class="odn-detail-item"><label>Persona Reporta</label><span>${a.persona_reporta||'—'}</span></div>
      <div class="odn-detail-item"><label>Dirección</label><span style="font-size:12px">${a.direccion||'—'}</span></div>
      <div class="odn-detail-item"><label>Tipo Servicio</label><span>${a.tipo_servicio}</span></div>
      <div class="odn-detail-item"><label>Plan</label><span>${a.plan||'—'}</span></div>
      <div class="odn-detail-item"><label>OLT</label><span>${a.olt||'—'}</span></div>
      <div class="odn-detail-item"><label>Tarjeta</label><span>${a.tarjeta||'—'}</span></div>
      <div class="odn-detail-item"><label>Slot / Puerto</label><span>${a.slot||'—'} / ${a.puerto||'—'}</span></div>
      <div class="odn-detail-item"><label>ONT ID</label><span>${a.ont_id||'—'}</span></div>
      <div class="odn-detail-item"><label>FAT</label><span>${a.fat||'—'}</span></div>
      <div class="odn-detail-item"><label>Serial ONT</label><span style="font-size:11px">${a.serial||'—'}</span></div>
      <div class="odn-detail-item"><label>CVLAN</label><span>${a.cvlan||'—'}</span></div>
      <div class="odn-detail-item"><label>Días Transcurridos</label><span style="color:${parseInt(a.dias_transcurridos||0)>30?'var(--red)':'inherit'}">${a.dias_transcurridos||'—'}</span></div>
      <div class="odn-detail-item"><label>Área Resolutoria</label><span>${a.area_resolutoria||'—'}</span></div>
    </div>
    <div style="margin-top:10px"><strong>Problema Reportado:</strong><br><span style="font-size:12px;color:var(--muted)">${a.problema_reporte||a.descripcion||'—'}</span></div>
    <div style="margin-top:8px"><strong>Último Comentario:</strong><br><span style="font-size:12px;color:var(--muted);font-style:italic">${a.ultimo_comentario||'—'}</span></div>
    ${a.causa_raiz ? `<div style="margin-top:8px"><strong>Causa Raíz:</strong> ${a.causa_raiz}<br><strong>Acción:</strong> ${a.accion_correctiva||'—'}</div>` : ''}
  `);
}

function abrirPlanillaTecnico(avId) {
  const a = DB.averias.find(x => x.id_averia === avId);
  if (!a) return;
  const sev = SEV_LABELS[a.severidad] || SEV_LABELS[5];
  showModal(`Planilla de Cierre — Avería ${avId}`, `
    <div style="background:#FFF3E0;border-radius:8px;padding:10px 14px;margin-bottom:14px;border-left:3px solid var(--orange)">
      <div style="font-weight:700;font-size:13px">${a.nombre}</div>
      <div style="font-size:12px;color:var(--muted)">${a.direccion} · Tel: ${a.telefono||'—'} ${a.contacto?'· Contacto: '+a.contacto:''}</div>
      <div style="margin-top:4px"><span class="pill ${sev.pill}">${sev.label}</span> · Resp. máx: ${sev.resp} · Resolución: ${sev.resol}</div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>Causa Raíz Identificada</label>
        <select id="ptec-causa">
          <option value="">— Seleccionar —</option>
          <option>Conector sucio / contaminado</option>
          <option>Cable drop dañado</option>
          <option>ONT defectuosa (requiere reemplazo)</option>
          <option>Corte de cable de fibra</option>
          <option>Splitter degradado</option>
          <option>Macrocurvatura en cable</option>
          <option>Empalme deteriorado</option>
          <option>Falla de alimentación eléctrica</option>
          <option>CTO/FAT dañada (vandalismo/humedad)</option>
          <option>Configuración incorrecta en OLT</option>
          <option>Problema de routing/VLAN</option>
          <option>Otro (especificar en observaciones)</option>
        </select>
      </div>
      <div class="form-col">
        <label>Medida Tomada</label>
        <select id="ptec-accion">
          <option value="">— Seleccionar —</option>
          <option>Limpieza de conector (Insp → Limpiar → Re-insp)</option>
          <option>Reemplazo de ONT</option>
          <option>Reemplazo de cable drop</option>
          <option>Empalme por fusión de emergencia</option>
          <option>Reemplazo de splitter</option>
          <option>Corrección de macrocurvatura</option>
          <option>Reemplazo de CTO/FAT</option>
          <option>Bypass de emergencia (MC-06)</option>
          <option>Reinicio / reconfiguración OLT</option>
          <option>Otra (especificar en observaciones)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>Atenuación Antes (dB)</label>
        <input type="number" id="ptec-att-antes" placeholder="Ej: 0.45" step="0.01">
      </div>
      <div class="form-col">
        <label>Atenuación Después (dB)</label>
        <input type="number" id="ptec-att-despues" placeholder="Ej: 0.04" step="0.01">
      </div>
      <div class="form-col">
        <label>Tiempo de Resolución (min)</label>
        <input type="number" id="ptec-tiempo" placeholder="Ej: 90" min="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-col">
        <label>¿Se restableció el servicio?</label>
        <select id="ptec-restablecido">
          <option value="Si">Sí — Servicio restablecido al 100%</option>
          <option value="Parcial">Parcial — Servicio degradado</option>
          <option value="No">No — Requiere continuación</option>
        </select>
      </div>
      <div class="form-col">
        <label>Observaciones</label>
        <textarea id="ptec-obs" rows="2" placeholder="Hallazgos adicionales..."></textarea>
      </div>
    </div>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-green" onclick="cerrarAveriaTecnico('${avId}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Cerrar Avería
    </button>
  `);
}

function cerrarAveriaTecnico(avId) {
  const causa = document.getElementById('ptec-causa')?.value;
  const accion = document.getElementById('ptec-accion')?.value;
  if (!causa || !accion) { alert('Complete la causa raíz y la medida tomada.'); return; }
  const a = DB.averias.find(x => x.id_averia === avId);
  if (!a) return;
  a.estado_gestion = 'Cerrada';
  a.causa_raiz = causa;
  a.accion_correctiva = accion;
  a.att_antes = document.getElementById('ptec-att-antes')?.value || '';
  a.att_despues = document.getElementById('ptec-att-despues')?.value || '';
  a.tiempo_resolucion = document.getElementById('ptec-tiempo')?.value || '';
  a.servicio_restablecido = document.getElementById('ptec-restablecido')?.value || '';
  a.obs_tecnico = document.getElementById('ptec-obs')?.value || '';
  a.fecha_cierre = new Date().toISOString().slice(0,16).replace('T',' ');
  a.cerrado_por = SESSION.user;
  // Also close associated OT if any
  if (a.ot_asignada) {
    const ot = DB.ordenes.find(o => o.id === a.ot_asignada);
    if (ot && ot.estado !== 'Completada') {
      ot.estado = 'Completada';
      ot.fecha_cierre = a.fecha_cierre;
      ot.resultado = `${accion} — ${a.servicio_restablecido === 'Si' ? 'Servicio restablecido' : 'Pendiente'}`;
      ot.atten = a.att_despues;
    }
  }
  addHistorial('averia_cerrada', { id: avId, causa, zona: a.zona, tecnico: SESSION.user });
  saveDB();
  closeModal();
  alert(`Avería ${avId} cerrada exitosamente.`);
  renderView('averias-tec');
}

/* ============================================================
   INIT — Firebase + LocalStorage
   ============================================================ */
function hideSplash() {
  const splash = document.getElementById('splash-screen');
  if (splash) {
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.display = 'none'; }, 500);
  }
}

let _loginShown = false;
function showLoginScreen() {
  if (_loginShown) return;
  _loginShown = true;
  document.getElementById('login-screen').classList.remove('hidden');
  hideSplash();
}

function esAppInstalada() {
  // Detecta si se está ejecutando como PWA instalada (no una pestaña de navegador normal)
  try {
    return window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true
      || document.referrer.includes('android-app://');
  } catch(e) { return false; }
}

async function initApp() {
  loadDB();

  // Sesión persistente offline: SOLO para la app instalada (PWA).
  // En navegador web normal se mantiene el flujo original (login siempre).
  const sesionGuardada = esAppInstalada() ? restaurarSesionLocal() : null;
  if (sesionGuardada) {
    hideSplash();
    completarLogin(sesionGuardada);
    // Sincronizar en segundo plano si hay internet, sin bloquear la interfaz
    (async () => {
      await new Promise(resolve => {
        if (window._FB_READY) return resolve();
        document.addEventListener('firebase-ready', resolve, { once: true });
        setTimeout(resolve, 5000);
      });
      if (window._FB_READY) {
        try {
          await Promise.race([pullFromFirestore(), new Promise(r => setTimeout(r, 4000))]);
          if (SESSION && window._currentView) { destroyCharts(); renderView(window._currentView); }
          const syncInd = document.getElementById('sync-indicator');
          if (syncInd) { syncInd.title = 'Sincronizado con la nube'; syncInd.style.background = 'var(--green)'; }
        } catch(e) { console.warn('Sync en segundo plano omitida:', e); }
      }
    })();
    return;
  }

  // Sin sesión guardada: flujo normal de splash + login
  // Red de seguridad: mostrar login en 8s pase lo que pase
  const safetyTimer = setTimeout(showLoginScreen, 8000);

  // Esperar firebase-ready (evento) o timeout de 5s
  await new Promise(resolve => {
    if (window._FB_READY) return resolve();
    document.addEventListener('firebase-ready', resolve, { once: true });
    setTimeout(resolve, 5000);
  });

  if (window._FB_READY) {
    const splashMsg = document.getElementById('splash-msg');
    if (splashMsg) splashMsg.textContent = 'Sincronizando...';
    try {
      await Promise.race([
        pullFromFirestore(),
        new Promise(r => setTimeout(r, 4000))
      ]);
    } catch(e) { console.warn('Sync omitida:', e); }
  }

  clearTimeout(safetyTimer);
  showLoginScreen();
}

initApp();


</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW not available:', err));
  });
}

// PWA install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});
</script>
