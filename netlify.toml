[build]
  command = """
    mkdir -p dist &&
    sed \
      -e 's|__FIREBASE_API_KEY__|'"$FIREBASE_API_KEY"'|g' \
      -e 's|__FIREBASE_AUTH_DOMAIN__|'"$FIREBASE_AUTH_DOMAIN"'|g' \
      -e 's|__FIREBASE_PROJECT_ID__|'"$FIREBASE_PROJECT_ID"'|g' \
      -e 's|__FIREBASE_STORAGE_BUCKET__|'"$FIREBASE_STORAGE_BUCKET"'|g' \
      -e 's|__FIREBASE_MESSAGING_SENDER_ID__|'"$FIREBASE_MESSAGING_SENDER_ID"'|g' \
      -e 's|__FIREBASE_APP_ID__|'"$FIREBASE_APP_ID"'|g' \
      index.html > dist/index.html &&
    cp service-worker.js dist/service-worker.js &&
    cp manifest.json dist/manifest.json 2>/dev/null || true &&
    cp -r icons dist/icons 2>/dev/null || true
  """
  publish = "dist"

[build.environment]
  # Firebase web client config values (apiKey, authDomain, projectId, etc.) are
  # public by design — they are shipped to the browser and are not secrets.
  # Access is protected by Firebase Security Rules, not by hiding these values.
  # They must appear in the built dist/index.html, so exclude them from Netlify's
  # secrets scanner to avoid false positives.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY,FIREBASE_AUTH_DOMAIN,FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_APP_ID"
